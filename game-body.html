<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
/* ====== 全域基礎樣式 ====== */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
#xx-root{
  /* 整個遊戲的容器：直式手機優先，最大寬度 760 置中 */
  width:100%;max-width:760px;margin:0 auto;
  font-family:"Microsoft JhengHei","PingFang TC","Segoe UI",sans-serif;
  color:#fff;position:relative;
  background:transparent;
  display:flex;flex-direction:column;
  height:100vh;max-height:900px;overflow:hidden;
  border-radius:18px;
}
/* ====== 頂部狀態列 ====== */
#xx-status{
  flex:0 0 auto;padding:8px 10px;
  background:linear-gradient(135deg,#3a2a5e,#5b3a82);
  border-radius:18px 18px 0 0;
  box-shadow:0 2px 10px rgba(0,0,0,.3);
}
.xx-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.xx-realm-badge{
  font-weight:800;font-size:15px;padding:3px 10px;border-radius:12px;
  background:linear-gradient(135deg,#ffd86b,#ff9d3c);color:#5a2d00;
  box-shadow:0 2px 6px rgba(255,160,40,.5);white-space:nowrap;
}
.xx-lv{font-size:12px;background:rgba(255,255,255,.15);padding:2px 8px;border-radius:10px;}
.xx-bar{flex:1;height:13px;border-radius:8px;background:rgba(0,0,0,.35);overflow:hidden;position:relative;}
.xx-bar>i{display:block;height:100%;width:0;border-radius:8px;transition:width .25s;}
.xx-bar .qi-fill{background:linear-gradient(90deg,#5fe6ff,#3f9dff);}
.xx-bar .hp-fill{background:linear-gradient(90deg,#ff6b8a,#ff3c5e);}
.xx-bar .exp-fill{background:linear-gradient(90deg,#b3ff6b,#6bd43c);}
.xx-bar>span{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;text-shadow:0 1px 2px #000;}
.xx-label{font-size:11px;width:30px;opacity:.85;}
.xx-stats{display:flex;gap:8px;font-size:11px;flex-wrap:wrap;}
.xx-stats b{color:#ffe08a;}
.xx-stone{color:#7fffd4;font-weight:700;}
/* ====== 中間主畫面 ====== */
#xx-main{flex:1 1 auto;position:relative;overflow:hidden;background:#0f0a1e;}
.xx-page{position:absolute;inset:0;overflow-y:auto;padding:12px;display:none;}
.xx-page.active{display:block;}
#xx-page-battle.active{display:block;padding:0;}
/* 戰鬥畫布容器 */
#xx-canvas-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 40%,#241a40,#0d0820);}
#xx-canvas{touch-action:none;display:block;}
/* ====== 卡片通用 ====== */
.card{
  background:linear-gradient(135deg,#2a2148,#3a2a5e);
  border-radius:16px;padding:14px;margin-bottom:12px;
  box-shadow:0 4px 14px rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.08);
}
.card h3{font-size:16px;margin-bottom:8px;color:#ffd86b;}
.card p{font-size:13px;line-height:1.6;opacity:.9;}
.btn{
  display:inline-block;padding:10px 18px;border-radius:12px;border:none;
  font-size:14px;font-weight:800;cursor:pointer;color:#fff;
  background:linear-gradient(135deg,#7a5cff,#9d6bff);
  box-shadow:0 4px 10px rgba(120,90,255,.4);transition:transform .1s;
}
.btn:active{transform:scale(.95);}
.btn.gold{background:linear-gradient(135deg,#ffce47,#ff9d3c);color:#5a2d00;box-shadow:0 4px 10px rgba(255,160,40,.4);}
.btn.green{background:linear-gradient(135deg,#4fd97a,#2fb85e);}
.btn.red{background:linear-gradient(135deg,#ff6b6b,#e23c3c);}
.btn:disabled{opacity:.4;filter:grayscale(.6);cursor:not-allowed;}
.btn.small{padding:6px 12px;font-size:12px;}
/* ====== 打坐動畫 ====== */
#xx-meditate-stage{text-align:center;padding:20px 0;position:relative;}
.medi-char{font-size:90px;display:inline-block;filter:drop-shadow(0 8px 12px rgba(0,0,0,.5));animation:floaty 3s ease-in-out infinite;position:relative;z-index:2;}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.medi-aura{position:absolute;left:50%;top:50px;width:160px;height:160px;margin-left:-80px;border-radius:50%;
  background:radial-gradient(circle,rgba(95,230,255,.5),transparent 70%);animation:pulse 2s ease-in-out infinite;z-index:1;}
@keyframes pulse{0%,100%{transform:scale(.8);opacity:.5}50%{transform:scale(1.3);opacity:.9}}
.medi-on .medi-aura{animation:pulse 1s ease-in-out infinite;}
.qi-float{position:absolute;font-size:13px;color:#7fffd4;font-weight:800;pointer-events:none;animation:qiup 1.2s ease-out forwards;text-shadow:0 1px 3px #000;}
@keyframes qiup{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-50px)}}
/* ====== 搖桿 + 按鈕（戰鬥操控） ====== */
#xx-controls{flex:0 0 auto;height:150px;position:relative;background:linear-gradient(0deg,#241836,#1a1228);border-top:1px solid rgba(255,255,255,.06);display:none;}
#xx-controls.show{display:block;}
#xx-joy{position:absolute;left:18px;bottom:18px;width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.08),rgba(255,255,255,.02));border:2px solid rgba(255,255,255,.12);}
#xx-joy-knob{position:absolute;left:50%;top:50%;width:56px;height:56px;margin:-28px 0 0 -28px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#bda4ff,#7a5cff);box-shadow:0 4px 10px rgba(0,0,0,.5);transition:transform .05s;}
#xx-skills{position:absolute;right:14px;bottom:14px;width:200px;height:130px;}
.skbtn{position:absolute;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:#fff;text-align:center;border:2px solid rgba(255,255,255,.2);overflow:hidden;cursor:pointer;text-shadow:0 1px 2px #000;}
#sk-atk{right:0;bottom:0;width:88px;height:88px;background:radial-gradient(circle at 35% 30%,#ff8a5c,#e23c3c);box-shadow:0 4px 12px rgba(226,60,60,.5);font-size:13px;}
#sk-1{right:92px;bottom:6px;width:60px;height:60px;background:radial-gradient(circle at 35% 30%,#5f9dff,#3f6dff);}
#sk-2{right:78px;bottom:70px;width:60px;height:60px;background:radial-gradient(circle at 35% 30%,#c45fff,#8a3fff);}
#sk-3{right:6px;bottom:96px;width:56px;height:56px;background:radial-gradient(circle at 35% 30%,#ffd35f,#ff9d3c);color:#5a2d00;}
.skbtn .cd-mask{position:absolute;inset:0;pointer-events:none;border-radius:50%;}
.skbtn .cd-txt{position:absolute;font-size:16px;font-weight:900;pointer-events:none;}
.skbtn.dim{filter:grayscale(.7) brightness(.6);}
.skbtn .nm{line-height:1.1;}
.skbtn .qc{font-size:9px;opacity:.85;}
/* ====== 底部分頁 ====== */
#xx-tabs{flex:0 0 auto;display:flex;background:#1a1228;border-top:1px solid rgba(255,255,255,.08);border-radius:0 0 18px 18px;}
.xx-tab{flex:1;text-align:center;padding:8px 2px 9px;font-size:11px;cursor:pointer;color:#9a8fc0;transition:.15s;}
.xx-tab .ic{font-size:21px;display:block;line-height:1.2;}
.xx-tab.active{color:#ffd86b;background:rgba(255,255,255,.05);}
.xx-tab.active .ic{filter:drop-shadow(0 0 6px rgba(255,210,90,.8));}
.xx-tab.glow{animation:tabglow 1s ease-in-out infinite;}
@keyframes tabglow{0%,100%{color:#ffd86b}50%{color:#fff}}
/* ====== 列表 / 物品格 ====== */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(74px,1fr));gap:8px;}
.slot{aspect-ratio:1;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:11px;padding:4px;text-align:center;cursor:pointer;border:1px solid rgba(255,255,255,.1);position:relative;}
.slot .em{font-size:26px;line-height:1;}
.slot .nm{font-size:9px;margin-top:2px;line-height:1.1;}
.r1{background:linear-gradient(135deg,#4a4a4a,#6a6a6a);}
.r2{background:linear-gradient(135deg,#2f7a3f,#4fc06a);}
.r3{background:linear-gradient(135deg,#2f5fa0,#4f9dff);}
.r4{background:linear-gradient(135deg,#7a3fb0,#b46bff);box-shadow:0 0 8px rgba(180,107,255,.6);}
.r5{background:linear-gradient(135deg,#b0852f,#ffce47);box-shadow:0 0 12px rgba(255,206,71,.8);animation:rare 1.5s infinite;}
@keyframes rare{0%,100%{box-shadow:0 0 12px rgba(255,206,71,.7)}50%{box-shadow:0 0 22px rgba(255,206,71,1)}}
.qty{position:absolute;right:3px;bottom:2px;font-size:10px;font-weight:800;background:rgba(0,0,0,.5);padding:0 4px;border-radius:6px;}
/* ====== 進度條（煉丹） ====== */
.prog{height:18px;border-radius:9px;background:rgba(0,0,0,.4);overflow:hidden;margin:8px 0;}
.prog>i{display:block;height:100%;width:0;background:linear-gradient(90deg,#ff9d3c,#ffd86b);transition:width .3s linear;}
/* ====== 彈窗 ====== */
#xx-modal{position:absolute;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;}
#xx-modal.show{display:flex;}
.modal-box{background:linear-gradient(135deg,#332452,#46306e);border-radius:20px;padding:22px;max-width:340px;width:100%;text-align:center;
  border:2px solid rgba(255,210,90,.4);box-shadow:0 10px 40px rgba(0,0,0,.6);animation:popin .3s;}
@keyframes popin{0%{transform:scale(.7);opacity:0}100%{transform:scale(1);opacity:1}}
.modal-box h2{color:#ffd86b;margin-bottom:10px;font-size:20px;}
.modal-box .big-em{font-size:60px;margin:8px 0;animation:floaty 2s infinite;}
.modal-box p{font-size:14px;line-height:1.7;margin-bottom:14px;opacity:.95;}
/* ====== Toast 提示 ====== */
#xx-toast{position:absolute;top:90px;left:50%;transform:translateX(-50%);z-index:60;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none;width:90%;}
.toast{background:rgba(20,12,40,.92);border:1px solid rgba(255,210,90,.5);border-radius:12px;padding:8px 16px;font-size:13px;font-weight:700;
  animation:toastin .3s,toastout .4s 1.8s forwards;box-shadow:0 4px 14px rgba(0,0,0,.4);max-width:100%;}
@keyframes toastin{0%{transform:translateY(-12px);opacity:0}100%{transform:translateY(0);opacity:1}}
@keyframes toastout{100%{opacity:0;transform:translateY(-12px)}}
/* 金光升級全屏特效 */
#xx-flash{position:absolute;inset:0;z-index:55;pointer-events:none;display:none;background:radial-gradient(circle,rgba(255,220,100,.85),transparent 65%);}
#xx-flash.show{display:block;animation:flashk .9s ease-out;}
@keyframes flashk{0%{opacity:0;transform:scale(.4)}30%{opacity:1}100%{opacity:0;transform:scale(1.6)}}
/* 拍賣 NPC 喊價列 */
.bidlog{max-height:120px;overflow-y:auto;font-size:12px;background:rgba(0,0,0,.25);border-radius:10px;padding:8px;margin:8px 0;line-height:1.7;}
.bidlog .me{color:#7fffd4;font-weight:700;}
.bidlog .npc{color:#ffb3c8;}
.bidlog .sys{color:#ffd86b;}
.intro-scroll{font-size:13px;line-height:1.8;background:rgba(0,0,0,.2);border-radius:12px;padding:12px;margin-bottom:10px;font-style:italic;color:#e8d8ff;}
.tag{display:inline-block;font-size:10px;padding:1px 7px;border-radius:8px;background:rgba(255,255,255,.15);margin-left:4px;}
.flex-wrap{display:flex;gap:8px;flex-wrap:wrap;}
@media (max-width:380px){.medi-char{font-size:72px}}
</style>

<div id="xx-root">
  <!-- 頂部狀態列 -->
  <div id="xx-status">
    <div class="xx-row">
      <span class="xx-realm-badge" id="ui-realm">煉氣境</span>
      <span class="xx-lv" id="ui-lv">Lv.1</span>
      <span class="xx-stone">🪙 <b id="ui-stone">0</b></span>
    </div>
    <div class="xx-row"><span class="xx-label">靈氣</span><div class="xx-bar"><i class="qi-fill" id="ui-qi-fill"></i><span id="ui-qi-txt">0/100</span></div></div>
    <div class="xx-row"><span class="xx-label">血量</span><div class="xx-bar"><i class="hp-fill" id="ui-hp-fill"></i><span id="ui-hp-txt">100/100</span></div></div>
    <div class="xx-row xx-stats">
      <span>⚔️攻 <b id="ui-atk">10</b></span>
      <span>🛡️防 <b id="ui-def">0</b></span>
      <span>📜經驗 <b id="ui-exp">0</b></span>
      <span>🏆斬妖 <b id="ui-kills">0</b></span>
    </div>
  </div>

  <!-- 中間主畫面 -->
  <div id="xx-main">
    <!-- 打坐頁 -->
    <div class="xx-page active" id="xx-page-meditate">
      <div class="card" style="text-align:center">
        <h3>🧘 打坐吐納</h3>
        <div id="xx-meditate-stage" class="medi-on">
          <div class="medi-aura"></div>
          <div class="medi-char">🧘‍♂️</div>
        </div>

        <p style="margin-top:8px;font-size:12px;opacity:.7" id="medi-realm-desc"></p>

          <button class="btn" id="btn-medi-toggle">暫停打坐</button>

      </div>
      <div class="card" style="text-align:center">
        <h3>⚡ 境界突破</h3>
        <p id="bt-info">距離突破還需更多靈氣</p>
        <div style="margin-top:10px">
          <button class="btn gold" id="btn-breakthrough">突破境界</button>
        </div>
        <p style="margin-top:8px;font-size:12px;opacity:.7" id="bt-rate"></p>
      </div>
      <div class="card">
        <h3>📖 散修崛起：斬妖煉天訣</h3>
        <p style="font-size:12px" id="world-intro"></p>
      </div>
    </div>

    <!-- 戰鬥頁 -->
    <div class="xx-page" id="xx-page-battle">
      <div id="xx-canvas-wrap"><canvas id="xx-canvas" width="720" height="900"></canvas></div>
    </div>

    <!-- 奇遇頁 -->
    <div class="xx-page" id="xx-page-event">
      <div class="card" style="text-align:center">
        <h3>🌫️ 雲遊奇遇</h3>
        <p>遊歷天地，總有際遇。每次外出耗少許心神，福禍自負。</p>
        <div style="margin-top:12px"><button class="btn green" id="btn-event">外出遊歷 🎲</button></div>
      </div>
      <div id="event-result"></div>
    </div>

    <!-- 煉丹頁 -->
    <div class="xx-page" id="xx-page-alchemy">
      <div class="card">
        <h3>⚗️ 煉丹房</h3>
        <p style="font-size:12px">靈草：<span id="herb-list"></span></p>
        <div class="prog" id="furnace-prog" style="display:none"><i></i></div>
        <p id="furnace-txt" style="font-size:12px;display:none"></p>
        <div style="margin-top:8px" id="furnace-actions"></div>
      </div>
      <div id="recipe-list"></div>
    </div>

    <!-- 拍賣頁 -->
    <div class="xx-page" id="xx-page-auction">
      <div class="card">
        <h3>🔨 萬寶閣拍賣行</h3>
        <p style="font-size:12px" id="auction-status">每日付 50 靈石入場，5 件珍寶輪番上拍。</p>
        <div style="margin-top:10px" id="auction-enter-wrap"><button class="btn gold" id="btn-auction-enter">入場 (50 靈石)</button></div>
      </div>
      <div id="auction-stage" style="display:none"></div>
    </div>

    <!-- 背包頁 -->
    <div class="xx-page" id="xx-page-bag">
      <div class="card">
        <h3>🎒 背包 · 丹藥</h3>
        <div class="grid" id="bag-pills"></div>
      </div>
      <div class="card">
        <h3>💎 珍寶 · 法寶（永久加成）</h3>
        <div class="grid" id="bag-treasures"></div>
      </div>
      <div class="card">
        <h3>🌿 靈草材料</h3>
        <div class="grid" id="bag-herbs"></div>

    <!-- 戰鬥操控（搖桿+技能） -->

        <div class="skbtn" id="sk-2"><span class="nm">五雷</span><span class="qc">40</span><div class="cd-mask"></div><span class="cd-txt"></span></div>
        <div class="skbtn" id="sk-3"><span class="nm">劍陣</span><span class="qc">90</span><div class="cd-mask"></div><span class="cd-txt"></span></div>
      </div>
    </div>

    <!-- 彈窗 / 特效 / 提示 -->
    <div id="xx-modal"><div class="modal-box" id="modal-box"></div></div>
    <div id="xx-flash"></div>
    <div id="xx-toast"></div>
  </div>

  <!-- 底部分頁 -->
  <div id="xx-tabs">
    <div class="xx-tab active" data-page="meditate"><span class="ic">🧘</span>打坐</div>
    <div class="xx-tab" data-page="battle"><span class="ic">⚔️</span>戰鬥</div>
    <div class="xx-tab" data-page="event"><span class="ic">🌫️</span>奇遇</div>
    <div class="xx-tab" data-page="alchemy"><span class="ic">⚗️</span>煉丹</div>
    <div class="xx-tab" data-page="auction"><span class="ic">🔨</span>拍賣</div>
    <div class="xx-tab" data-page="bag"><span class="ic">🎒</span>背包</div>

<script>
(function(){
"use strict";
/* =========================================================================
   散修崛起：斬妖煉天訣 — 單一自包含 2.5D 等角修仙 RPG
   架構：DATA(設計資料) → STATE(存檔) → 各系統(打坐/突破/戰鬥/奇遇/煉丹/拍賣)
   ========================================================================= */

/* ---------- 1. 世界觀與數值資料（照設計師 JSON） ---------- */
var WORLD = {
  intro:"你本是凡塵一介散修，無門無派、無師無錢，只有一口不肯認命的氣。一卷殘破道訣、一塊靈石、一條荒野斜陽路——從這裡開始，打坐吐納、揮劍斬妖，總有一天要把這片天，踩在腳底下。走吧，少年，這條登仙路，沒人為你鋪，那就自己殺出來。",
  realms:[
    {name:"煉氣境",desc:"剛把天地靈氣吸進丹田，像第一次喝靈茶被嗆到，連飛劍都拿不穩。"},
    {name:"築基境",desc:"丹田打地基蓋房子，靈力總算不再漏風，能御物半空小飄一下。"},
    {name:"金丹境",desc:"靈力凝成一顆金燦燦的丹，走路有風、放屁帶光，凡人見了得喊前輩。"},
    {name:"元嬰境",desc:"體內孕出一個小小的自己，肉身爆了還能靠元嬰逃命，命硬得像蟑螂。"},
    {name:"化神境",desc:"神識能撐開半座山，動念之間風雲變色，開始有資格跟天講道理。"},
    {name:"煉虛境",desc:"把虛空當黏土捏，一拳打出去能砸出個窟窿，凡間已經裝不下你了。"},
    {name:"合體境",desc:"人與天地法則合而為一，一舉一動都是道，連呼吸都在偷渡靈氣。"},
    {name:"大乘境",desc:"準備渡劫飛升的最後一站，跺一腳整片大陸都要抖三抖。"},
    {name:"渡劫境",desc:"老天親自下場用雷劈你，扛過去成仙，扛不過去化灰，刺激。"},
    {name:"散仙境",desc:"飛升失敗卻沒死透的狠人，遊走天地縫隙，比仙還難纏，比魔還自由。"}
  ],
  // 各境界數值表
  realmStats:[
    {breakthroughCost:100,successRate:1,idlePerSec:5,atk:10,hp:100},
    {breakthroughCost:800,successRate:0.95,idlePerSec:18,atk:22,hp:260},
    {breakthroughCost:6000,successRate:0.9,idlePerSec:65,atk:50,hp:680},
    {breakthroughCost:42000,successRate:0.85,idlePerSec:230,atk:115,hp:1750},

/* ---------- 2. 工具函式 ---------- */
function fmt(n){ // 大數字格式化（萬/億/兆）
  n=Math.floor(n);
  if(n<10000)return ''+n;
  if(n<1e8)return (n/1e4).toFixed(n<1e6?1:0)+'萬';
  if(n<1e12)return (n/1e8).toFixed(2)+'億';
  return (n/1e12).toFixed(2)+'兆';
}
function rnd(a,b){return a+Math.random()*(b-a);}
function clamp(v,a,b){return v<a?a:(v>b?b:v);}
function todayStr(){ // 台北日期 yyyy-mm-dd
  var d=new Date(Date.now()+8*3600*1000);
  return d.toISOString().slice(0,10);
}

var SAVE_KEY="xianxia_save_v1";
var S; // 全域狀態
function defaultState(){
  return {
    realm:0, exp:0, qi:0, level:1,

    kills:0,

    auctionEntered:false, // 今日是否已入場
    auctionItems:null,    // 今日拍賣品

    clearCount:0
  };
}
function load(){
  try{
    var raw=localStorage.getItem(SAVE_KEY);
    if(raw){ S=JSON.parse(raw);
      // 補欄位（版本相容）
      var d=defaultState();
      for(var k in d){ if(!(k in S)) S[k]=d[k]; }
    } else { S=defaultState(); }
  }catch(e){ S=defaultState(); }
}
function save(){
  try{ S.lastSave=Date.now(); localStorage.setItem(SAVE_KEY,JSON.stringify(S)); }catch(e){}
}

/* ---------- 4. 衍生屬性計算（含珍寶加成） ---------- */
function treasureBonus(){
  // 把背包裡珍寶的百分比加成統計起來
  var b={atk:0,def:0,hp:0,idle:0};
  for(var nm in S.treasures){
    if(S.treasures[nm]<=0)continue;
    var t=WORLD.treasures.find(function(x){return x.name===nm;});
    if(!t)continue;
    var cnt=S.treasures[nm];
    if(t.atk)b.atk+=t.atk*cnt;
    if(t.def)b.def+=t.def*cnt;
    if(t.hp)b.hp+=t.hp*cnt;
    if(t.idle)b.idle+=t.idle*cnt;
  }
  return b;
}
function playerAtk(){
  var base=WORLD.realmStats[S.realm].atk;
  var tb=treasureBonus();
  return Math.round(base*(1+S.bonusAtkPct)*(1+tb.atk));
}
function playerDef(){
  var tb=treasureBonus();
  return Math.round(S.realm*8*(1+tb.def));
}
function playerMaxHp(){
  var tb=treasureBonus();
  return Math.round(WORLD.realmStats[S.realm].hp*(1+tb.hp));
}
function idlePerSec(){
  var tb=treasureBonus();
  return Math.round(WORLD.realmStats[S.realm].idlePerSec*(1+tb.idle));
}
function breakthroughCost(){return WORLD.realmStats[S.realm].breakthroughCost;}

/* ---------- 5. DOM 快捷 ---------- */
function $(id){return document.getElementById(id);}
function el(tag,cls,html){var e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;}

/* ---------- 6. Toast / Modal / Flash ---------- */
function toast(msg){
  var box=$("xx-toast");
  var t=el("div","toast",msg);
  box.appendChild(t);
  setTimeout(function(){ if(t.parentNode)t.parentNode.removeChild(t); },2300);
}
function modal(html){
  $("modal-box").innerHTML=html;
  $("xx-modal").classList.add("show");
}
function closeModal(){ $("xx-modal").classList.remove("show"); }
$("xx-modal").addEventListener("click",function(e){ if(e.target.id==="xx-modal")closeModal(); });
function flash(){
  var f=$("xx-flash");f.classList.remove("show");void f.offsetWidth;f.classList.add("show");
  setTimeout(function(){f.classList.remove("show");},900);
}

  var rs=WORLD.realmStats[S.realm];

  else { medTab.classList.remove("glow"); $("ui-realm").style.boxShadow=""; }
}

var meditating=true;
function setupMeditate(){
  $("world-intro").textContent=WORLD.intro;
  $("medi-realm-desc").textContent=WORLD.realms[S.realm].desc;
  $("btn-medi-toggle").addEventListener("click",function(){
    meditating=!meditating;

    $("xx-meditate-stage").classList.toggle("medi-on",meditating);
  });
  $("btn-breakthrough").addEventListener("click",doBreakthrough);
}
function meditateTick(dt){
  // dt 秒。靈氣每秒 += idlePerSec
  if(meditating){
    var gain=idlePerSec()*dt;
    S.qi+=gain;
    // 隨機冒靈氣數字（節流）
    if(currentPage==="meditate" && Math.random()<dt*1.5){
      spawnQiFloat("+"+fmt(idlePerSec()));
    }
  }
}
function spawnQiFloat(txt){
  var stage=$("xx-meditate-stage");
  var f=el("div","qi-float",txt);
  f.style.left=(30+Math.random()*40)+"%";
  f.style.top=(40+Math.random()*30)+"%";
  stage.appendChild(f);
  setTimeout(function(){if(f.parentNode)f.parentNode.removeChild(f);},1200);
}
function refreshMeditateUI(){
  $("medi-rate").textContent="每秒回靈氣 +"+fmt(idlePerSec());
  $("medi-realm-desc").textContent=WORLD.realms[S.realm].name+"："+WORLD.realms[S.realm].desc;
  var cost=breakthroughCost();
  var rs=WORLD.realmStats[S.realm];
  if(S.realm>=9){
    $("bt-info").textContent="已臻散仙之境，登仙路盡頭，唯有橫掃天地。";
    $("btn-breakthrough").disabled=true;
    $("bt-rate").textContent="";
  } else if(S.qi>=cost){
    $("bt-info").innerHTML="靈氣已滿！可突破至 <b style='color:#ffd86b'>"+WORLD.realms[S.realm+1].name+"</b>";
    $("btn-breakthrough").disabled=false;
    $("bt-rate").textContent="成功率 "+Math.round(rs.successRate*100)+"%（失敗損失 40% 靈氣）";
  } else {
    $("bt-info").innerHTML="突破需 <b>"+fmt(cost)+"</b> 靈氣，目前 "+fmt(S.qi)+"（還差 "+fmt(cost-S.qi)+"）";
    $("btn-breakthrough").disabled=true;
    $("bt-rate").textContent="下一境：成功率 "+Math.round(rs.successRate*100)+"%";
  }
}

/* =========================================================================
   9. 突破系統
   ========================================================================= */
function doBreakthrough(){
  if(S.realm>=9)return;
  var cost=breakthroughCost();
  if(S.qi<cost){ toast("靈氣不足，無法突破"); return; }
  var rate=WORLD.realmStats[S.realm].successRate;
  S.qi-=cost;
  if(Math.random()<rate){
    // 成功
    S.realm++;
    player.hp=playerMaxHp();
    flash();
    modal(
      "<h2>✨ 突破成功 ✨</h2>"+
      "<div class='big-em'>🌟</div>"+
      "<p>金光大盛！你晉升至 <b style='color:#ffd86b'>"+WORLD.realms[S.realm].name+"</b>！<br>"+
      WORLD.realms[S.realm].desc+"</p>"+
      "<button class='btn gold' onclick='__xx.closeModal()'>繼續登仙</button>"
    );
    unlockRecipes();
    save();
  } else {
    // 失敗：再扣 40% 已有靈氣（題目：失敗損失 40%）
    var loss=Math.floor(S.qi*0.4);
    S.qi-=loss;
    modal(
      "<h2>💥 突破失敗</h2>"+
      "<div class='big-em'>😵</div>"+
      "<p>靈氣暴走、經脈翻湧！突破失敗，額外損耗 <b style='color:#ff8a8a'>"+fmt(loss)+"</b> 靈氣。<br>穩住心神，再來一次！</p>"+
      "<button class='btn red' onclick='__xx.closeModal()'>重整旗鼓</button>"
    );
    save();
  }
  refreshAll();
}

// 世界座標 → 螢幕座標（等角投影）
function worldToScreen(wx,wy){
  // wx,wy 為格子座標（可小數）。中心對齊畫布中上
  var ox=CW/2, oy=170;
  return {
    x:ox+(wx-wy)*TILE_W/2,
    y:oy+(wx+wy)*TILE_H/2
  };
}
function initBattle(){
  // 依玩家境界決定怪物階（-1~+1 浮動）
  spawnWave();
  player.x=GRID/2; player.y=GRID/2;
  player.hp=playerMaxHp();
}
function spawnWave(){
  enemies=[]; projectiles=[]; particles=[]; floatTexts=[]; waveCleared=false;
  var pr=S.realm;
  var n=5+Math.floor(Math.random()*3); // 5-7 隻
  // 每場 10% 出 Boss
  var bossWave=Math.random()<0.18;
  for(var i=0;i<n;i++){
    var enemyRealm=clamp(pr+Math.floor(rnd(-1,1.99)),0,9);
    var elite=Math.random()<0.15?6:1; // 精英機率
    var em=WORLD.mobs[Math.floor(Math.random()*WORLD.mobs.length)];
    addEnemy(em,enemyRealm,elite,false);
  }
  if(bossWave){
    var bd=WORLD.bosses[Math.floor(Math.random()*WORLD.bosses.length)];
    addEnemy({name:bd.name,em:bd.em,c:"#ff5a5a"},clamp(pr,0,9),25,true,bd);
    toast("⚠️ "+bd.name+" 現身！");
  }
}
function addEnemy(em,realm,eliteMult,isBoss,bossData){
  var ang=Math.random()*Math.PI*2, r=2.5+Math.random()*1.5;
  var hp=Math.round(60*Math.pow(2.6,realm)*eliteMult);
  enemies.push({
    name:em.name, em:em.em, color:em.c,
    realm:realm, elite:eliteMult, isBoss:!!isBoss, boss:bossData||null,
    x:clamp(GRID/2+Math.cos(ang)*r,0.5,GRID-0.5),
    y:clamp(GRID/2+Math.sin(ang)*r,0.5,GRID-0.5),
    hp:hp, maxHp:hp,
    atk:Math.round(6*Math.pow(2.4,realm)*eliteMult),
    atkCd:0, hitFlash:0, knock:{x:0,y:0}, size:isBoss?1.6:(eliteMult>1?1.25:1)
  });
}

// 搖桿輸入向量（-1~1）
var moveVec={x:0,y:0};
var keys={};

function battleUpdate(dt){
  if(currentPage!=="battle")return;
  var ms=dt*1000;
  // --- 玩家移動 ---
  var mv={x:moveVec.x,y:moveVec.y};
  // 桌機鍵盤
  if(keys["w"]||keys["arrowup"])mv.y-=1;
  if(keys["s"]||keys["arrowdown"])mv.y+=1;
  if(keys["a"]||keys["arrowleft"])mv.x-=1;
  if(keys["d"]||keys["arrowright"])mv.x+=1;
  var len=Math.hypot(mv.x,mv.y);
  if(len>0.01){
    var nx=mv.x/len, ny=mv.y/len;
    // 等角：螢幕方向轉世界方向（螢幕右下=世界y+，右上=世界x+）
    // 把螢幕向量映射到等角格子位移
    var speed=220/((TILE_W+TILE_H)/2)*dt; // 換算成格/秒概念
    var wdx=(nx/(TILE_W/2)+ny/(TILE_H/2))/2;
    var wdy=(ny/(TILE_H/2)-nx/(TILE_W/2))/2;
    var wl=Math.hypot(wdx,wdy)||1;
    var mspd=4.2*dt;
    player.x=clamp(player.x+wdx/wl*mspd,0.3,GRID-0.3);
    player.y=clamp(player.y+wdy/wl*mspd,0.3,GRID-0.3);
    player.facing={x:wdx/wl,y:wdy/wl};
  }
  // --- 普攻冷卻 ---
  if(player.atkCd>0)player.atkCd-=ms;
  // --- 技能冷卻 ---
  for(var i=0;i<3;i++)if(skillCd[i]>0)skillCd[i]-=ms;
  // 長按普攻
  if(atkHeld && player.atkCd<=0)doAttack();
  // --- 敵人 AI ---
  var prange=0.55; // 攻擊距離（格）
  for(var e=enemies.length-1;e>=0;e--){
    var en=enemies[e];
    if(en.hitFlash>0)en.hitFlash-=ms;
    // 擊退衰減
    en.x+=en.knock.x; en.y+=en.knock.y;
    en.knock.x*=0.8; en.knock.y*=0.8;
    en.x=clamp(en.x,0.3,GRID-0.3); en.y=clamp(en.y,0.3,GRID-0.3);
    var dx=player.x-en.x, dy=player.y-en.y, d=Math.hypot(dx,dy);
    if(d>prange){
      // 朝玩家移動
      var es=(en.isBoss?1.6:2.4)*dt;
      en.x+=dx/d*es; en.y+=dy/d*es;
    } else {
      // 攻擊玩家
      if(en.atkCd>0)en.atkCd-=ms;
      else {
        en.atkCd=1100;
        var dmg=Math.max(1,en.atk-playerDef());
        player.hp-=dmg;
        addParticles(player.x,player.y,"#ff5a5a",6);
        floatTexts.push({wx:player.x,wy:player.y-0.5,txt:"-"+fmt(dmg),c:"#ff6b6b",life:800,vy:-0.4});
        if(player.hp<=0){ onPlayerDown(); return; }
      }
    }
  }
  // --- 投射物（御劍斬劍氣） ---
  for(var p=projectiles.length-1;p>=0;p--){
    var pr=projectiles[p];
    pr.x+=pr.vx*dt; pr.y+=pr.vy*dt; pr.life-=ms;
    // 命中
    for(var e2=enemies.length-1;e2>=0;e2--){
      var en2=enemies[e2];
      if(Math.hypot(en2.x-pr.x,en2.y-pr.y)<0.6){
        if(!pr.hitSet)pr.hitSet={};
        if(!pr.hitSet[e2]){ pr.hitSet[e2]=1; hitEnemy(en2,pr.dmg,pr.vx,pr.vy); }
      }
    }
    if(pr.life<=0||pr.x<-1||pr.x>GRID+1||pr.y<-1||pr.y>GRID+1)projectiles.splice(p,1);
  }
  // --- 粒子 / 飄字 ---
  for(var pa=particles.length-1;pa>=0;pa--){
    var P=particles[pa]; P.x+=P.vx*dt; P.y+=P.vy*dt; P.life-=ms; if(P.life<=0)particles.splice(pa,1);
  }
  for(var ft=floatTexts.length-1;ft>=0;ft--){
    var F=floatTexts[ft]; F.wy+=F.vy*dt; F.life-=ms; if(F.life<=0)floatTexts.splice(ft,1);
  }
  // --- 清場結算 ---
  if(enemies.length===0 && !waveCleared){
    waveCleared=true;
    onWaveClear();
  }
}

function doAttack(){
  if(player.atkCd>0)return;
  player.atkCd=450;
  var range=70/((TILE_W+TILE_H)/2*0.5)*0.55; // 攻擊半徑（格）
  var atk=playerAtk();
  var hitAny=false;
  for(var e=0;e<enemies.length;e++){
    var en=enemies[e];
    if(Math.hypot(en.x-player.x,en.y-player.y)<1.1){
      hitEnemy(en,atk,player.facing.x,player.facing.y);
      hitAny=true;
    }
  }
  // 揮砍粒子
  addParticles(player.x+player.facing.x*0.6,player.y+player.facing.y*0.6,"#fff",4);
}

function castSkill(idx){
  // idx 0,1,2 對應三顆技能鈕 = 御劍斬 / 五雷轟頂 / 太虛劍陣
  var def=WORLD.skills[idx];
  if(!def||idx>2)return;          // 只接受 0~2，防呆
  if(skillCd[idx]>0)return;
  if(S.qi<def.qiCost){ toast("靈氣不足"); return; }
  S.qi-=def.qiCost;
  skillCd[idx]=def.cooldownMs;
  var atk=playerAtk();
  if(idx===0){
    // 御劍斬：射出穿透劍氣
    var f=player.facing;
    projectiles.push({x:player.x,y:player.y,vx:f.x*9,vy:f.y*9,dmg:Math.round(atk*def.dmgMult),life:700,hitSet:{}});
    addParticles(player.x,player.y,"#5f9dff",8);
  } else if(idx===1){
    // 五雷轟頂：以玩家面前一點為中心範圍打擊
    var cx=player.x+player.facing.x*1.5, cy=player.y+player.facing.y*1.5;
    for(var e=0;e<enemies.length;e++){
      var en=enemies[e];
      if(Math.hypot(en.x-cx,en.y-cy)<1.6){ hitEnemy(en,Math.round(atk*def.dmgMult),en.x-player.x,en.y-player.y); }
    }
    for(var k=0;k<18;k++)addParticles(cx+rnd(-1,1),cy+rnd(-1,1),"#c45fff",1);
    floatTexts.push({wx:cx,wy:cy-1,txt:"⚡五雷轟頂",c:"#c45fff",life:700,vy:-0.3});
  } else if(idx===2){
    // 太虛劍陣：以玩家為中心全範圍多段傷害
    for(var e3=0;e3<enemies.length;e3++){
      var en3=enemies[e3];
      if(Math.hypot(en3.x-player.x,en3.y-player.y)<2.6){ hitEnemy(en3,Math.round(atk*def.dmgMult),en3.x-player.x,en3.y-player.y); }
    }
    for(var k2=0;k2<30;k2++){var a=Math.random()*6.28,rr=Math.random()*2.2;addParticles(player.x+Math.cos(a)*rr,player.y+Math.sin(a)*rr,"#ffd86b",1);}
    floatTexts.push({wx:player.x,wy:player.y-1.5,txt:"🌀太虛劍陣",c:"#ffd86b",life:900,vy:-0.3});
  }
}

function hitEnemy(en,dmg,dirx,diry){
  en.hp-=dmg; en.hitFlash=160;
  // 擊退
  var l=Math.hypot(dirx,diry)||1;
  en.knock.x+=dirx/l*0.18; en.knock.y+=diry/l*0.18;
  addParticles(en.x,en.y,"#fff",5);
  floatTexts.push({wx:en.x,wy:en.y-0.8,txt:fmt(dmg),c:"#fff3a0",life:600,vy:-0.5});
  if(en.hp<=0)killEnemy(en);
}
function killEnemy(en){
  var idx=enemies.indexOf(en);
  if(idx<0)return;
  enemies.splice(idx,1);
  // 結算經驗、靈氣、靈石
  var expGain=Math.round(8*Math.pow(1.5,en.realm))*(en.isBoss?20:(en.elite>1?5:1));
  S.exp+=expGain;
  var qiGain=Math.round(expGain*(1+S.realm*0.15));
  S.qi+=qiGain;
  var stoneGain=Math.round(3*Math.pow(1.7,en.realm))*en.elite;
  S.stone+=stoneGain;
  S.kills++;
  // 戰鬥熟練度：每累積 cost*0.5 經驗 +2% atk（上限+50%）
  var thresh=breakthroughCost()*0.5;
  if(S.exp>=thresh && S.bonusAtkPct<0.5){
    S.exp-=thresh; S.bonusAtkPct=Math.min(0.5,S.bonusAtkPct+0.02);
    toast("⚔️ 戰鬥熟練度提升！攻擊 +2%");
  }
  // 掉靈草（30%）
  if(Math.random()<0.3){
    var hi=clamp(en.realm,0,5);
    S.herbs[hi]=(S.herbs[hi]||0)+1;
  }
  addParticles(en.x,en.y,en.color,12);
  floatTexts.push({wx:en.x,wy:en.y-1,txt:"+"+fmt(qiGain)+"靈氣 +"+fmt(stoneGain)+"🪙",c:"#7fffd4",life:900,vy:-0.5});
  refreshStatus();
}
function onWaveClear(){
  // 清場獎勵（總靈石的 20%，每日前 3 次雙倍）
  if(S.clearCountDay!==todayStr()){ S.clearCountDay=todayStr(); S.clearCount=0; }
  var dbl=S.clearCount<3?2:1;
  var bonus=Math.round(rnd(30,80)*Math.pow(1.7,S.realm))*dbl;
  S.stone+=bonus; S.clearCount++;
  // 10% 奇遇寶箱
  if(Math.random()<0.12){
    var ev=Math.round(50*Math.pow(1.8,S.realm));
    S.stone+=ev;
    toast("🎁 奇遇寶箱！額外 +"+fmt(ev)+" 靈石");
  }
  save();
  setTimeout(function(){
    if(currentPage==="battle"){
      toast("✅ 清場！+"+fmt(bonus)+" 靈石"+(dbl>1?"（雙倍）":""));
      spawnWave();
    }
  },900);
}
function onPlayerDown(){
  player.hp=1;
  // 嘗試自動吃回氣丹
  var key="回氣丹|1";
  if(S.pills[key]&&S.pills[key]>0){
    S.pills[key]--; player.hp=playerMaxHp();
    toast("💊 自動服用回氣丹，滿血續戰！");
  } else {
    toast("💀 重傷敗退！靈石損失少許");
    S.stone=Math.floor(S.stone*0.9);
    player.hp=playerMaxHp();
    spawnWave();
  }
  refreshStatus();
}

function addParticles(wx,wy,color,n){
  for(var i=0;i<n;i++){
    var a=Math.random()*6.28,s=rnd(0.5,2.5);
    particles.push({x:wx,y:wy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rnd(250,500),color:color});
  }
}

/* ---- 戰鬥繪製 ---- */
function drawBattle(){
  ctx.clearRect(0,0,CW,CH);
  // 背景
  var g=ctx.createRadialGradient(CW/2,300,50,CW/2,400,600);
  g.addColorStop(0,"#2a1f4a"); g.addColorStop(1,"#0d0820");
  ctx.fillStyle=g; ctx.fillRect(0,0,CW,CH);
  // 等角地磚
  for(var i=0;i<GRID;i++)for(var j=0;j<GRID;j++){
    var s=worldToScreen(i,j);
    drawTile(s.x,s.y,(i+j)%2===0?"#3a2d5e":"#332650");
  }
  // 收集所有可繪物，依 y 排序（畫家演算法做出前後遮擋）
  var drawList=[];
  enemies.forEach(function(en){ drawList.push({wy:en.x+en.y,type:"enemy",ref:en}); });
  drawList.push({wy:player.x+player.y,type:"player"});
  drawList.sort(function(a,b){return a.wy-b.wy;});
  // 投射物（先畫在地上）
  projectiles.forEach(function(pr){
    var s=worldToScreen(pr.x,pr.y);
    ctx.save();ctx.globalAlpha=.9;
    ctx.fillStyle="#7fd4ff";ctx.shadowColor="#5f9dff";ctx.shadowBlur=14;
    ctx.beginPath();ctx.ellipse(s.x,s.y,16,7,Math.atan2(pr.vy,pr.vx),0,6.28);ctx.fill();
    ctx.restore();
  });
  // 角色與敵人
  drawList.forEach(function(d){
    if(d.type==="enemy")drawEnemy(d.ref);
    else drawPlayer();
  });
  // 粒子
  particles.forEach(function(P){
    var s=worldToScreen(P.x,P.y);
    ctx.globalAlpha=clamp(P.life/400,0,1);
    ctx.fillStyle=P.color;
    ctx.beginPath();ctx.arc(s.x,s.y-20,3,0,6.28);ctx.fill();
  });
  ctx.globalAlpha=1;
  // 飄字
  floatTexts.forEach(function(F){
    var s=worldToScreen(F.wx,F.wy);
    ctx.globalAlpha=clamp(F.life/600,0,1);
    ctx.font="bold 22px sans-serif";ctx.textAlign="center";
    ctx.fillStyle=F.c;ctx.strokeStyle="#000";ctx.lineWidth=3;
    ctx.strokeText(F.txt,s.x,s.y-30);ctx.fillText(F.txt,s.x,s.y-30);
  });
  ctx.globalAlpha=1;
  // 提示文字
  ctx.font="14px sans-serif";ctx.textAlign="left";ctx.fillStyle="rgba(255,255,255,.5)";
  ctx.fillText("敵 "+enemies.length+" 隻 · 搖桿走位，靠近普攻",16,28);
}
function drawTile(x,y,color){
  ctx.beginPath();
  ctx.moveTo(x,y-TILE_H/2);
  ctx.lineTo(x+TILE_W/2,y);
  ctx.lineTo(x,y+TILE_H/2);
  ctx.lineTo(x-TILE_W/2,y);
  ctx.closePath();
  ctx.fillStyle=color;ctx.fill();
  ctx.strokeStyle="rgba(255,255,255,.05)";ctx.lineWidth=1;ctx.stroke();
}
function drawShadow(x,y,r){
  ctx.save();ctx.globalAlpha=.35;ctx.fillStyle="#000";
  ctx.beginPath();ctx.ellipse(x,y,r,r*0.42,0,0,6.28);ctx.fill();ctx.restore();
}
function drawPlayer(){
  var s=worldToScreen(player.x,player.y);
  drawShadow(s.x,s.y,22);
  // 發光光環
  ctx.save();
  ctx.shadowColor="#5fe6ff";ctx.shadowBlur=18;
  ctx.font="46px sans-serif";ctx.textAlign="center";ctx.textBaseline="alphabetic";
  ctx.fillText("🧙",s.x,s.y-8);
  ctx.restore();
  // 朝向小箭頭
  ctx.save();ctx.globalAlpha=.6;
  var fs=worldToScreen(player.x+player.facing.x*0.7,player.y+player.facing.y*0.7);
  ctx.strokeStyle="#7fffd4";ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(s.x,s.y-20);ctx.lineTo(fs.x,fs.y-20);ctx.stroke();ctx.restore();
}
function drawEnemy(en){
  var s=worldToScreen(en.x,en.y);
  drawShadow(s.x,s.y,18*en.size);
  ctx.save();
  if(en.hitFlash>0){ctx.globalAlpha=0.7;ctx.shadowColor="#fff";ctx.shadowBlur=20;}
  else if(en.isBoss){ctx.shadowColor="#ff3c3c";ctx.shadowBlur=16;}
  ctx.font=(34*en.size)+"px sans-serif";ctx.textAlign="center";
  ctx.fillText(en.em,s.x,s.y-6);
  ctx.restore();
  // 血條
  var bw=34*en.size, bh=5;
  var bx=s.x-bw/2, by=s.y-38*en.size;
  ctx.fillStyle="rgba(0,0,0,.6)";ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle=en.isBoss?"#ff3c5e":(en.elite>1?"#ffb13c":"#6bd43c");
  ctx.fillRect(bx,by,bw*clamp(en.hp/en.maxHp,0,1),bh);
  // 名稱
  ctx.font="11px sans-serif";ctx.textAlign="center";
  ctx.fillStyle=en.isBoss?"#ff8a8a":"rgba(255,255,255,.75)";
  ctx.fillText((en.elite>1&&!en.isBoss?"【精英】":"")+en.name,s.x,by-3);
}

/* =========================================================================
   11. 搖桿 + 按鈕 控制（pointer events 同時吃觸控與滑鼠）
   ========================================================================= */
var joyActive=false, joyId=null, joyCenter={x:0,y:0};
var atkHeld=false;
function setupControls(){
  var joy=$("xx-joy"), knob=$("xx-joy-knob");
  function joyStart(e){
    joyActive=true; joyId=e.pointerId;
    var r=joy.getBoundingClientRect();
    joyCenter={x:r.left+r.width/2, y:r.top+r.height/2};
    joyMove(e);
  }
  function joyMove(e){
    if(!joyActive||e.pointerId!==joyId)return;
    var dx=e.clientX-joyCenter.x, dy=e.clientY-joyCenter.y;
    var d=Math.hypot(dx,dy), max=46, dead=10;
    if(d<dead){ moveVec={x:0,y:0}; knob.style.transform="translate(0,0)"; return; }
    var cd=Math.min(d,max);
    var kx=dx/d*cd, ky=dy/d*cd;
    knob.style.transform="translate("+kx+"px,"+ky+"px)";
    moveVec={x:dx/d, y:dy/d};
  }
  function joyEnd(e){
    if(e.pointerId!==joyId)return;
    joyActive=false; joyId=null; moveVec={x:0,y:0};
    knob.style.transform="translate(0,0)";
  }
  joy.addEventListener("pointerdown",function(e){e.preventDefault();joyStart(e);});
  window.addEventListener("pointermove",joyMove);
  window.addEventListener("pointerup",joyEnd);
  window.addEventListener("pointercancel",joyEnd);

  // 普攻鈕（長按連續）
  var atkBtn=$("sk-atk");
  atkBtn.addEventListener("pointerdown",function(e){e.preventDefault();atkHeld=true;doAttack();});
  window.addEventListener("pointerup",function(){atkHeld=false;});
  // 三技能鈕
  ["sk-1","sk-2","sk-3"].forEach(function(id,idx){
    $(id).addEventListener("pointerdown",function(e){e.preventDefault();castSkill(idx);});
  });

  // 桌機鍵盤
  window.addEventListener("keydown",function(e){
    var k=e.key.toLowerCase(); keys[k]=true;
    if(currentPage==="battle"){
      if(k==="j"||k===" ")doAttack();
      if(k==="q")castSkill(0);
      if(k==="e")castSkill(1);
      if(k==="r")castSkill(2);
    }
  });
  window.addEventListener("keyup",function(e){keys[e.key.toLowerCase()]=false;});
  // 滑鼠左鍵普攻（桌機備援，點 canvas）
  cv.addEventListener("pointerdown",function(e){ if(e.pointerType==="mouse"){doAttack();} });
}
function updateSkillButtons(){
  // 更新技能鈕冷卻遮罩與靈氣可用狀態
  [["sk-1",0],["sk-2",1],["sk-3",2]].forEach(function(p){
    var btn=$(p[0]), idx=p[1], def=WORLD.skills[idx];
    var cd=skillCd[idx], maxcd=def.cooldownMs;
    var mask=btn.querySelector(".cd-mask"), txt=btn.querySelector(".cd-txt");
    if(cd>0){
      var pct=cd/maxcd*360;
      mask.style.background="conic-gradient(rgba(0,0,0,.6) "+pct+"deg, transparent 0deg)";
      txt.textContent=(cd/1000).toFixed(1);
    } else { mask.style.background="none"; txt.textContent=""; }
    btn.classList.toggle("dim",S.qi<def.qiCost||cd>0);
  });
}

function triggerEvent(){

  var effHtml="", color="#fff";
  var realmScale=Math.pow(1.8,S.realm);
  if(ev.type==="good"){
    color="#7fffd4";
    var roll=Math.random();
    if(roll<0.5){ var g=Math.round(rnd(50,150)*realmScale); S.qi+=g; effHtml="靈氣 +"+fmt(g); }
    else if(roll<0.8){ var st=Math.round(rnd(40,120)*realmScale); S.stone+=st; effHtml="靈石 +"+fmt(st); }
    else { var hi=clamp(S.realm,0,5); S.herbs[hi]+=2; effHtml="獲得靈草 ×2"; }
  } else if(ev.type==="bad"){
    color="#ff8a8a";
    var roll2=Math.random();
    if(roll2<0.5){ var loss=Math.round(rnd(30,80)*realmScale); S.qi=Math.max(0,S.qi-loss); effHtml="靈氣 -"+fmt(loss); }
    else { var sl=Math.min(S.stone,Math.round(rnd(20,60)*realmScale)); S.stone-=sl; effHtml="靈石 -"+fmt(sl); }
  } else {
    // neutral：賭一把
    color="#ffd86b";
    if(Math.random()<0.5){ var gg=Math.round(rnd(60,200)*realmScale); S.stone+=gg; effHtml="賭贏了！靈石 +"+fmt(gg); }
    else { var ll=Math.min(S.stone,Math.round(rnd(20,80)*realmScale)); S.stone-=ll; effHtml="賭輸了…靈石 -"+fmt(ll); }
  }
  $("event-result").innerHTML=
    "<div class='card'><h3>"+(ev.type==="good"?"🍀 ":ev.type==="bad"?"☠️ ":"🎲 ")+ev.title+"</h3>"+
    "<p>"+ev.text+"</p>"+
    "<p style='margin-top:10px;font-weight:800;color:"+color+"'>結果："+effHtml+"</p></div>";
  save(); refreshAll();
}

   13. 煉丹系統
   ========================================================================= */
function recipeUnlocked(tier){
  // tier 1~6 對應境界解鎖規則
  var r=S.realm;
  if(tier===1)return r>=0;
  if(tier===2)return r>=2;
  if(tier===3)return r>=3;
  if(tier===4)return r>=4;
  if(tier===5)return r>=6;
  if(tier===6)return r>=8;
  return false;
}
function unlockRecipes(){ renderRecipes(); }
function refineTime(tier){ return Math.round(30*Math.pow(2.2,tier-1)); } // 秒
function setupAlchemy(){ renderRecipes(); }
function renderRecipes(){
  // 靈草顯示
  var hl=WORLD.herbs.map(function(h,i){return h+"×"+(S.herbs[i]||0);}).join("、");
  $("herb-list").textContent=hl;
  var box=$("recipe-list"); box.innerHTML="";
  WORLD.pills.forEach(function(pill,i){
    var tier=pill.grade;
    var unlocked=recipeUnlocked(tier);
    var herbHave=S.herbs[tier-1]||0;
    var c=el("div","card");
    c.innerHTML=
      "<h3>"+pill.em+" "+pill.name+" <span class='tag'>"+tier+"階丹方</span></h3>"+
      "<p>"+pill.desc+"</p>"+
      "<p style='font-size:12px;margin-top:6px'>耗時 "+refineTime(tier)+" 秒 · 需 "+WORLD.herbs[tier-1]+" ×3（現有 "+herbHave+"）</p>";
    var btn=el("button","btn small"+(unlocked?"":" "),unlocked?"開爐煉製":"境界未達·未解鎖");
    btn.disabled=!unlocked||S.furnace!=null||herbHave<3;
    if(unlocked&&S.furnace==null&&herbHave<3)btn.textContent="靈草不足";
    btn.onclick=function(){ startRefine(i,tier); };
    c.appendChild(btn);
    box.appendChild(c);
  });
  renderFurnace();
}
function startRefine(pillIdx,tier){
  if(S.furnace!=null){ toast("丹爐使用中"); return; }
  if((S.herbs[tier-1]||0)<3){ toast("靈草不足"); return; }
  S.herbs[tier-1]-=3;
  S.furnace={ pillIdx:pillIdx, tier:tier, endTime:Date.now()+refineTime(tier)*1000, total:refineTime(tier)*1000 };
  save(); renderRecipes();
}
function renderFurnace(){
  var prog=$("furnace-prog"), txt=$("furnace-txt"), act=$("furnace-actions");
  if(!S.furnace){ prog.style.display="none"; txt.style.display="none"; act.innerHTML=""; return; }
  prog.style.display="block"; txt.style.display="block";
  var left=Math.max(0,S.furnace.endTime-Date.now());
  var pct=clamp(100-left/S.furnace.total*100,0,100);
  prog.querySelector("i").style.width=pct+"%";
  var pill=WORLD.pills[S.furnace.pillIdx];
  if(left<=0){
    txt.innerHTML="<b style='color:#ffd86b'>"+pill.name+" 煉製完成！</b>";
    act.innerHTML="";
    var b=el("button","btn green small","🎉 開爐取丹");
    b.onclick=collectPill; act.appendChild(b);
  } else {
    txt.innerHTML="正在煉製 <b>"+pill.name+"</b>… 剩 "+Math.ceil(left/1000)+" 秒";
    act.innerHTML="";
    var cost=Math.ceil(left/1000*0.5); // 加速費
    var sb=el("button","btn gold small","⚡ 靈石加速 ("+fmt(cost)+")");
    sb.disabled=S.stone<cost;
    sb.onclick=function(){
      if(S.stone<cost){toast("靈石不足");return;}
      S.stone-=cost; S.furnace.endTime=Date.now(); save(); renderRecipes(); refreshStatus();
    };
    act.appendChild(sb);
  }
}
function collectPill(){
  if(!S.furnace)return;
  var tier=S.furnace.tier, pill=WORLD.pills[S.furnace.pillIdx];
  // 擲骰決定稀有度
  var roll=Math.random(), acc=0, rarity=WORLD.rarityTiers[0];
  for(var i=0;i<WORLD.rarityTiers.length;i++){ acc+=WORLD.rarityTiers[i].chance; if(roll<acc){rarity=WORLD.rarityTiers[i];break;} }
  var rtIdx=rarity.tier; // 1~5
  var key=pill.name+"|"+rtIdx;
  S.pills[key]=(S.pills[key]||0)+1;
  S.furnace=null; save();
  var rname=WORLD.rarityNames[rtIdx-1];
  var gainQi=WORLD.pillBaseValue[tier-1]*rarity.effectMult;
  modal(
    "<h2>"+(rtIdx>=4?"🌟 ":"")+"煉成 "+rname+"！</h2>"+
    "<div class='big-em r"+rtIdx+"' style='display:inline-block;width:90px;height:90px;border-radius:20px;line-height:90px'>"+pill.em+"</div>"+
    "<p><b class='tag r"+rtIdx+"' style='padding:2px 10px'>"+rname+"</b> "+pill.name+"<br>"+
    "服用可得 <b style='color:#7fffd4'>"+fmt(gainQi)+"</b> 靈氣修為</p>"+
    "<button class='btn green' onclick='__xx.closeModal()'>收入背包</button>"
  );
  if(rtIdx>=4)flash();
  renderRecipes(); refreshStatus(); renderBag();
}
function eatPill(key){
  if(!S.pills[key]||S.pills[key]<=0)return;
  var parts=key.split("|"); var name=parts[0], rt=parseInt(parts[1]);
  var pill=WORLD.pills.find(function(p){return p.name===name;});
  if(!pill)return;
  S.pills[key]--; if(S.pills[key]<=0)delete S.pills[key];
  var mult=WORLD.rarityTiers[rt-1].effectMult;
  var gain=Math.round(WORLD.pillBaseValue[pill.grade-1]*mult);
  S.qi+=gain;
  toast("服下"+WORLD.rarityNames[rt-1]+pill.name+"，靈氣 +"+fmt(gain));
  save(); renderBag(); refreshAll();
}
function sellPill(key){
  if(!S.pills[key]||S.pills[key]<=0)return;
  var parts=key.split("|"); var name=parts[0], rt=parseInt(parts[1]);
  var pill=WORLD.pills.find(function(p){return p.name===name;});
  if(!pill)return; // 防呆：存檔殘留未知丹名時不要崩潰
  var mult=WORLD.rarityTiers[rt-1].effectMult;
  var price=Math.round(WORLD.pillBaseValue[pill.grade-1]*mult*0.15);
  S.pills[key]--; if(S.pills[key]<=0)delete S.pills[key];
  S.stone+=price;
  toast("賣出"+pill.name+"，靈石 +"+fmt(price));
  save(); renderBag(); refreshStatus();
}

var auction={ current:null, log:[], npcs:[], highBid:0, highBidder:"", running:false };
function setupAuction(){
  $("btn-auction-enter").addEventListener("click",enterAuction);
}
function genAuctionItems(){
  // 每日生成 5 件，依權重抽稀有度
  var pool=[
    {tier:0,name:"普通",val:800,w:0.45},
    {tier:1,name:"稀有",val:5000,w:0.35},
    {tier:2,name:"史詩",val:35000,w:0.15},
    {tier:3,name:"傳說",val:250000,w:0.05}
  ];
  var items=[];
  for(var i=0;i<5;i++){
    var r=Math.random(),acc=0,pick=pool[0];
    for(var j=0;j<pool.length;j++){acc+=pool[j].w;if(r<acc){pick=pool[j];break;}}
    var tr=WORLD.treasures[Math.floor(Math.random()*WORLD.treasures.length)];
    items.push({ treasure:tr.name, rarityName:pick.name, rarityTier:pick.tier, trueValue:pick.val });
  }
  S.auctionItems=items; S.auctionIndex=0; S.auctionDay=todayStr();
}
function enterAuction(){
  if(S.auctionDay!==todayStr()){ genAuctionItems(); S.auctionEntered=false; }
  if(!S.auctionEntered){
    if(S.stone<50){ toast("靈石不足，無法入場"); return; }
    S.stone-=50; S.auctionEntered=true; save(); refreshStatus();
    toast("付 50 靈石入場");
  }
  $("auction-enter-wrap").style.display="none";
  $("auction-status").innerHTML="<i>"+WORLD.auctioneerIntro+"</i>";
  $("auction-stage").style.display="block";
  nextAuctionItem();
}
function nextAuctionItem(){
  if(S.auctionIndex>=S.auctionItems.length){
    $("auction-stage").innerHTML="<div class='card' style='text-align:center'><h3>🔨 散場了</h3><p>今夜五件珍寶皆已落槌，諸位道友明日請早。</p></div>";
    save(); return;
  }
  var item=S.auctionItems[S.auctionIndex];
  var tr=WORLD.treasures.find(function(t){return t.name===item.treasure;});
  // 生成 NPC（3-5 名，各有隱藏上限）
  var npcCount=3+Math.floor(Math.random()*3);
  auction.npcs=[];
  var npcNames=["蒙面散修","青衫公子","黑袍老者","紅衣女修","獨臂劍客","富商王員外","神秘道人"];
  var used={};
  for(var i=0;i<npcCount;i++){
    var nm; do{nm=npcNames[Math.floor(Math.random()*npcNames.length)];}while(used[nm]&&Object.keys(used).length<npcNames.length); used[nm]=1;
    auction.npcs.push({ name:nm, cap:Math.round(item.trueValue*rnd(0.7,1.05)), out:false });
  }
  auction.current=item; auction.highBid=Math.round(item.trueValue*0.3); auction.highBidder="起標"; auction.log=[]; auction.running=true;
  logBid("sys",WORLD.auctioneerIntro.slice(0,0)+"【第 "+(S.auctionIndex+1)+" 件】"+item.rarityName+"級「"+item.treasure+"」起標 "+fmt(auction.highBid)+" 靈石！");
  renderAuctionItem(tr,item);
  // 先讓 NPC 喊一輪墊高
  setTimeout(npcRound,600);
}
function renderAuctionItem(tr,item){
  var rcls="r"+(item.rarityTier+1>5?5:item.rarityTier+1);
  $("auction-stage").innerHTML=
    "<div class='card'>"+
    "<div style='text-align:center'><div class='"+rcls+"' style='display:inline-block;width:90px;height:90px;border-radius:20px;font-size:50px;line-height:90px'>"+tr.em+"</div></div>"+
    "<h3 style='text-align:center;margin-top:8px'>"+tr.em+" "+item.treasure+" <span class='tag "+rcls+"'>"+item.rarityName+"</span></h3>"+
    "<p style='text-align:center'>"+tr.desc+"</p>"+
    "<p style='text-align:center;font-size:12px;margin-top:4px;color:#7fffd4'>類型："+tr.type+"（得標永久加成）</p>"+
    "<div style='text-align:center;margin:8px 0;font-size:15px'>當前最高：<b style='color:#ffd86b' id='au-high'>"+fmt(auction.highBid)+"</b> 靈石（"+auction.highBidder+"）</div>"+
    "<div class='bidlog' id='au-log'></div>"+
    "<div class='flex-wrap' style='justify-content:center'>"+
      "<button class='btn small' id='au-bid1'>加價 +"+fmt(minInc())+"</button>"+
      "<button class='btn gold small' id='au-bid2'>一口價 +50%</button>"+
      "<button class='btn red small' id='au-pass'>放棄此件</button>"+
    "</div></div>";
  renderBidLog();
  $("au-bid1").onclick=function(){ playerBid(auction.highBid+minInc()); };
  $("au-bid2").onclick=function(){ playerBid(Math.round(auction.highBid*1.5)); };
  $("au-pass").onclick=function(){ auction.running=false; toast("放棄競標"); S.auctionIndex++; setTimeout(nextAuctionItem,500); };
}
function minInc(){ return Math.max(Math.round(auction.highBid*0.05),10); }
function logBid(type,msg){ auction.log.push({type:type,msg:msg}); renderBidLog(); }
function renderBidLog(){
  var box=$("au-log"); if(!box)return;
  box.innerHTML=auction.log.map(function(l){return "<div class='"+l.type+"'>"+l.msg+"</div>";}).join("");
  box.scrollTop=box.scrollHeight;
  var h=$("au-high"); if(h)h.textContent=fmt(auction.highBid);
}
function playerBid(amount){
  if(!auction.running)return;
  if(amount<=auction.highBid){ toast("出價需高於當前"); return; }
  if(S.stone<amount){ toast("靈石不足"); return; }
  auction.highBid=amount; auction.highBidder="你";
  logBid("me","💰 你出價 "+fmt(amount)+" 靈石！");
  refreshStatus();
  setTimeout(npcRound,500);
}
function npcRound(){
  if(!auction.running)return;
  var anyActive=false;
  // 每個還在場的 NPC 依序決定是否加價
  var actedNpc=null;
  for(var i=0;i<auction.npcs.length;i++){
    var n=auction.npcs[i];
    if(n.out)continue;
    // 8% 心態退出
    if(Math.random()<0.08){ n.out=true; logBid("npc",n.name+" 搖頭退出了競標。"); continue; }
    if(auction.highBid>=n.cap){ n.out=true; logBid("npc",n.name+"「太貴了…」放棄。"); continue; }
    anyActive=true;
    if(auction.highBidder!=="你" && actedNpc){ continue; } // 一輪只讓一個 NPC 加價，避免瞬間跳完
    if(!actedNpc){
      // 此 NPC 加價 5%~12%，不超過 cap
      var inc=auction.highBid*rnd(0.05,0.12);
      var newBid=Math.min(Math.round(auction.highBid+inc),n.cap);
      if(newBid>auction.highBid){
        auction.highBid=newBid; auction.highBidder=n.name;
        logBid("npc","🗣️ "+n.name+" 出價 "+fmt(newBid)+" 靈石！");
        actedNpc=n;
      }
    }
  }
  // 偶爾插入拍賣官口白
  if(Math.random()<0.4){ logBid("sys","🔨 "+WORLD.catchphrases[Math.floor(Math.random()*5)]); }
  // 檢查是否所有 NPC 退出 → 玩家最高則得標
  var allOut=auction.npcs.every(function(n){return n.out;});
  if(allOut){
    if(auction.highBidder==="你"){ winAuction(); }
    else if(auction.highBidder==="起標"){ // 流標
      logBid("sys","無人應價，流標！此寶當日消失。");
      auction.running=false; S.auctionIndex++; setTimeout(nextAuctionItem,1200);
    } else { // NPC 得標
      logBid("sys","🔨 成交！「"+auction.current.treasure+"」由 "+auction.highBidder+" 帶走。下一件！");
      auction.running=false; S.auctionIndex++; setTimeout(nextAuctionItem,1400);
    }
  } else if(auction.highBidder!=="你"){
    // 還有 NPC，且目前 NPC 最高 → 等玩家行動（什麼都不做，等按鈕）
  }
}
function winAuction(){
  auction.running=false;
  if(S.stone<auction.highBid){ toast("靈石不足，無法付款，流標"); S.auctionIndex++; setTimeout(nextAuctionItem,800); return; }
  S.stone-=auction.highBid;
  var item=auction.current;
  S.treasures[item.treasure]=(S.treasures[item.treasure]||0)+1;
  var tr=WORLD.treasures.find(function(t){return t.name===item.treasure;});
  flash();
  modal(
    "<h2>🔨 落槌成交！</h2>"+
    "<div class='big-em'>"+tr.em+"</div>"+
    "<p>恭喜道友，以 <b style='color:#ffd86b'>"+fmt(auction.highBid)+"</b> 靈石拍得<br><b>"+item.treasure+"</b>！<br>"+
    "<span style='font-size:12px;color:#7fffd4'>"+tr.desc+"</span></p>"+
    "<button class='btn gold' onclick='__xx.closeModal()'>收入囊中</button>"
  );
  S.auctionIndex++; save(); refreshStatus(); renderBag();
  setTimeout(nextAuctionItem,400);
}

function renderBag(){
  // 丹藥
  var pb=$("bag-pills"); pb.innerHTML="";
  var keys=Object.keys(S.pills).filter(function(k){return S.pills[k]>0;});
  if(keys.length===0)pb.innerHTML="<p style='opacity:.6;font-size:12px'>尚無丹藥，去煉丹房煉幾爐吧。</p>";
  keys.forEach(function(key){
    var parts=key.split("|"); var name=parts[0], rt=parseInt(parts[1]);
    var pill=WORLD.pills.find(function(p){return p.name===name;});
    var slot=el("div","slot r"+rt);
    slot.innerHTML="<span class='em'>"+pill.em+"</span><span class='nm'>"+WORLD.rarityNames[rt-1]+name+"</span><span class='qty'>"+S.pills[key]+"</span>";
    slot.onclick=function(){
      modal("<h2>"+pill.em+" "+WORLD.rarityNames[rt-1]+pill.name+"</h2><p>"+pill.desc+"</p>"+
        "<div class='flex-wrap' style='justify-content:center'>"+
        "<button class='btn green small' id='m-eat'>服用</button>"+
        "<button class='btn gold small' id='m-sell'>賣出</button>"+
        "<button class='btn small' onclick='__xx.closeModal()'>關閉</button></div>");
      $("m-eat").onclick=function(){eatPill(key);closeModal();};
      $("m-sell").onclick=function(){sellPill(key);closeModal();};
    };
    pb.appendChild(slot);
  });
  // 珍寶
  var tb=$("bag-treasures"); tb.innerHTML="";
  var tk=Object.keys(S.treasures).filter(function(k){return S.treasures[k]>0;});
  if(tk.length===0)tb.innerHTML="<p style='opacity:.6;font-size:12px'>尚無珍寶，去拍賣行搶寶吧。</p>";
  tk.forEach(function(nm){
    var tr=WORLD.treasures.find(function(t){return t.name===nm;});
    var slot=el("div","slot r4");
    slot.innerHTML="<span class='em'>"+tr.em+"</span><span class='nm'>"+nm+"</span><span class='qty'>"+S.treasures[nm]+"</span>";
    slot.onclick=function(){
      var bon=[];
      if(tr.atk)bon.push("攻擊+"+Math.round(tr.atk*100)+"%");
      if(tr.def)bon.push("防禦+"+Math.round(tr.def*100)+"%");
      if(tr.hp)bon.push("血量+"+Math.round(tr.hp*100)+"%");
      if(tr.idle)bon.push("打坐+"+Math.round(tr.idle*100)+"%");
      modal("<h2>"+tr.em+" "+nm+"</h2><p>"+tr.desc+"</p><p style='color:#ffd86b'>永久加成（每件疊加）："+bon.join("、")+"<br>持有 ×"+S.treasures[nm]+"</p><button class='btn gold small' onclick='__xx.closeModal()'>關閉</button>");
    };
    tb.appendChild(slot);
  });
  // 靈草
  var hb=$("bag-herbs"); hb.innerHTML="";
  WORLD.herbs.forEach(function(h,i){
    if((S.herbs[i]||0)<=0)return;
    var slot=el("div","slot r"+clamp(i+1,1,5));
    slot.innerHTML="<span class='em'>🌿</span><span class='nm'>"+h+"</span><span class='qty'>"+S.herbs[i]+"</span>";
    hb.appendChild(slot);
  });
  if(hb.innerHTML==="")hb.innerHTML="<p style='opacity:.6;font-size:12px'>尚無靈草，去戰鬥或奇遇蒐集。</p>";
}

var currentPage="meditate";
function switchPage(name){
  currentPage=name;
  document.querySelectorAll(".xx-page").forEach(function(p){p.classList.remove("active");});
  $("xx-page-"+name).classList.add("active");
  document.querySelectorAll(".xx-tab").forEach(function(t){t.classList.toggle("active",t.dataset.page===name);});
  // 戰鬥才顯示搖桿
  $("xx-controls").classList.toggle("show",name==="battle");
  if(name==="battle"){
    if(enemies.length===0)initBattle();
    player.hp=Math.min(player.hp,playerMaxHp());if(player.hp<=0)player.hp=playerMaxHp();
    // 切到戰鬥頁這一刻畫布容器才真正有寬高，必須重算縮放，
    // 否則手機上 canvas 會用預設 720×900 撐爆版面（responsive 修正）
    resizeCanvas();
  }
  if(name==="alchemy")renderRecipes();
  if(name==="bag")renderBag();
  if(name==="auction"){
    // 切換時若已過日，重置入場
    if(S.auctionDay!==todayStr()){ S.auctionEntered=false; }
    if(S.auctionEntered && S.auctionItems){ $("auction-enter-wrap").style.display="none"; $("auction-stage").style.display="block"; nextAuctionItemSafe(); }
    else { $("auction-enter-wrap").style.display="block"; $("auction-stage").style.display="none"; }
  }
  refreshAll();
}
function nextAuctionItemSafe(){
  // 重入拍賣頁時的安全恢復
  if(!auction.running){
    if(S.auctionIndex>=(S.auctionItems?S.auctionItems.length:5)){
      $("auction-stage").innerHTML="<div class='card' style='text-align:center'><h3>🔨 今日已散場</h3><p>明日再來。</p></div>";
    } else { nextAuctionItem(); }
  }
}
function setupTabs(){
  document.querySelectorAll(".xx-tab").forEach(function(t){
    t.addEventListener("click",function(){ switchPage(t.dataset.page); });
  });
}

/* =========================================================================
   17. 主迴圈（requestAnimationFrame）+ 分頁暫停
   ========================================================================= */
var rafId=null, lastT=0, accSave=0, accUI=0;
function loop(t){
  rafId=requestAnimationFrame(loop);
  if(!lastT)lastT=t;
  var dt=Math.min((t-lastT)/1000,0.05); // 限制最大步進避免卡頓爆衝
  lastT=t;
  // 放置打坐永遠跑（背景也算）
  meditateTick(dt);
  // 戰鬥僅在戰鬥頁更新與繪製
  if(currentPage==="battle"){
    battleUpdate(dt);
    drawBattle();
    updateSkillButtons();
  }
  // UI 節流更新（每 0.2 秒）
  accUI+=dt;
  if(accUI>=0.2){ accUI=0; refreshStatusLight(); }
  // 自動存檔（每 5 秒）
  accSave+=dt;
  if(accSave>=5){ accSave=0; save(); }
  // 煉丹進度（僅煉丹頁刷新條）
  if(currentPage==="alchemy"&&S.furnace)renderFurnace();
}
function refreshStatusLight(){
  // 輕量刷新：頂部數值 + 當前頁面必要項
  refreshStatus();
  if(currentPage==="meditate")refreshMeditateUI();
}
function refreshAll(){
  refreshStatus();
  refreshMeditateUI();
}
// 切到背景分頁暫停 RAF，回來恢復（避免空跑）
document.addEventListener("visibilitychange",function(){
  if(document.hidden){ if(rafId){cancelAnimationFrame(rafId);rafId=null;} save(); }
  else { lastT=0; if(!rafId)rafId=requestAnimationFrame(loop); }
});

/* =========================================================================
   18. 離線收益（閉關）
   ========================================================================= */
function applyOffline(){
  var now=Date.now();
  var sec=(now-(S.lastSave||now))/1000;
  if(sec>60){ // 超過 1 分鐘才結算
    var cap=Math.min(sec,28800); // 上限 8 小時
    var gain=Math.round(idlePerSec()*cap*0.6); // 60% 效率
    if(gain>0){
      S.qi+=gain;
      var hh=Math.floor(cap/3600), mm=Math.floor(cap%3600/60);
      setTimeout(function(){
        modal("<h2>🧘 閉關歸來</h2><div class='big-em'>🌙</div>"+
          "<p>你閉關了 "+(hh>0?hh+" 小時 ":"")+mm+" 分鐘，<br>吐納積攢靈氣 <b style='color:#7fffd4'>+"+fmt(gain)+"</b>！</p>"+
          "<button class='btn gold' onclick='__xx.closeModal()'>繼續修行</button>");
      },400);
    }
  }
}

/* =========================================================================
   19. Canvas 響應式縮放
   ========================================================================= */
function resizeCanvas(){
  var wrap=$("xx-canvas-wrap");
  var w=wrap.clientWidth, h=wrap.clientHeight;
  if(w<=0||h<=0)return;
  var scale=Math.min(w/CW,h/CH);
  var dpr=window.devicePixelRatio||1;
  // 設定實際像素（含 dpr 防糊）
  cv.width=CW*dpr; cv.height=CH*dpr;
  cv.style.width=(CW*scale)+"px"; cv.style.height=(CH*scale)+"px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener("resize",function(){ setTimeout(resizeCanvas,50); });

/* =========================================================================
   20. 啟動
   ========================================================================= */
function init(){
  load();
  applyOffline();
  player.hp=playerMaxHp();
  setupMeditate();
  setupEvent();
  setupAlchemy();
  setupAuction();
  setupControls();
  setupTabs();
  resizeCanvas();
  refreshAll();
  renderBag();
  // 桌機隱藏搖桿提示（用鍵盤）
  if(!('ontouchstart' in window)){
    $("xx-joy").title="桌機可用 WASD / 方向鍵移動，J/空白普攻，Q/E/R 技能";
  }
  rafId=requestAnimationFrame(loop);
}

// 對外暴露給 inline onclick 用
window.__xx={ closeModal:closeModal };

// 等 DOM 與佈局就緒
if(document.readyState==="complete"||document.readyState==="interactive"){ setTimeout(init,60); }
else document.addEventListener("DOMContentLoaded",function(){ setTimeout(init,60); });

})();
</script>
