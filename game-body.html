<!-- ============================================================
  散修崛起：斬妖煉天訣 v2.0
  單一自包含網頁遊戲 body 片段（無外部資源，全 Canvas/CSS/emoji）
  重點實作：
   1. 可探索 2.5D 等角大地圖（相機跟隨、遊蕩怪、寶箱、NPC、傳送點、5 區解鎖）
   2. 歷練沉浸 session（切頁=暫停不結束、境界/修為單調不倒退、死亡溫和懲罰）
   3. 全場景化（打坐/煉丹/拍賣/奇遇/背包 都用 2.5D 畫面，非文字卡）
   4. 上癮回饋（頓挫/閃白/震屏/飄字/稀有金光/連擊連殺/每日任務/登入/里程碑）
   5. 帥氣修仙劍客（Canvas 畫道袍、髮髻、飛劍、靈氣光環）
  ============================================================ -->
<style>
/* ===== 全域變數（區域主題色用 CSS 變數，省資源） ===== */
#xx-root{
  --c-bg:#0d0b14; --c-panel:#171221; --c-panel2:#221a33; --c-line:#3a2f52;
  --c-gold:#f5d27a; --c-gold2:#e0a93b; --c-qi:#5fe0c8; --c-hp:#ff5a6a;
  --c-text:#ece6f7; --c-sub:#9a8fb5; --c-pur:#9d6fe0; --c-good:#6ee787; --c-bad:#ff6b6b;
  position:relative; width:100%; max-width:540px; margin:0 auto;
  height:88vh; max-height:880px; min-height:560px;
  background:var(--c-bg); color:var(--c-text);
  font-family:"Microsoft JhengHei","PingFang TC","Noto Sans CJK TC",system-ui,sans-serif;
  border-radius:18px; overflow:hidden; box-shadow:0 14px 50px rgba(0,0,0,.6);
  user-select:none; -webkit-user-select:none; -webkit-tap-highlight-color:transparent;
  touch-action:none;
}
#xx-root *{box-sizing:border-box;}
#xx-canvas{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:1;}

/* ===== 頂部狀態列 ===== */
#xx-top{position:absolute;top:0;left:0;right:0;z-index:20;padding:8px 12px;
  background:linear-gradient(180deg,rgba(13,11,20,.92),rgba(13,11,20,.0));
  pointer-events:none;}
#xx-top .row{display:flex;align-items:center;gap:8px;pointer-events:auto;}
#xx-realm{font-weight:800;font-size:15px;color:var(--c-gold);text-shadow:0 1px 4px #000;
  white-space:nowrap;}
#xx-area{font-size:11px;color:var(--c-sub);margin-left:auto;background:rgba(0,0,0,.35);
  padding:2px 8px;border-radius:10px;}
.xx-bar{height:9px;border-radius:6px;background:#2a2238;overflow:hidden;flex:1;
  border:1px solid rgba(255,255,255,.06);position:relative;}
.xx-bar>i{display:block;height:100%;width:0;transition:width .18s linear;}
#xx-qibar>i{background:linear-gradient(90deg,#2fb6a0,#7df0da);box-shadow:0 0 8px var(--c-qi);}
#xx-hpbar>i{background:linear-gradient(90deg,#c0394a,#ff7a86);}
.xx-bar .lab{position:absolute;inset:0;font-size:9px;line-height:9px;text-align:center;
  color:#fff;text-shadow:0 1px 2px #000;font-weight:700;letter-spacing:.3px;}
#xx-stones{font-size:12px;color:var(--c-gold);font-weight:700;white-space:nowrap;}
.xx-mini{display:flex;gap:6px;align-items:center;margin-top:5px;}

/* 小地圖 */
#xx-minimap{position:absolute;top:8px;right:10px;width:74px;height:74px;z-index:21;
  border-radius:10px;border:1px solid var(--c-line);background:rgba(0,0,0,.5);display:none;}
#xx-root.in-explore #xx-minimap{display:block;}

/* ===== 底部分頁列 ===== */
#xx-tabs{position:absolute;bottom:0;left:0;right:0;z-index:30;display:flex;
  background:linear-gradient(0deg,rgba(13,11,20,.97),rgba(13,11,20,.82));
  border-top:1px solid var(--c-line);}
#xx-tabs button{flex:1;border:0;background:none;color:var(--c-sub);
  padding:8px 2px 9px;font-size:11px;font-weight:700;cursor:pointer;line-height:1.3;
  transition:color .15s;font-family:inherit;}
#xx-tabs button .ic{font-size:18px;display:block;margin-bottom:1px;}
#xx-tabs button.on{color:var(--c-gold);}
#xx-tabs button.on .ic{filter:drop-shadow(0 0 6px var(--c-gold2));}
/* 探索中隱藏分頁列（沉浸），用回洞府鈕退出 */
#xx-root.in-explore #xx-tabs{display:none;}

/* ===== 場景面板（覆蓋在 canvas 上的 HTML UI 層） ===== */
.xx-scene{position:absolute;left:0;right:0;top:0;bottom:46px;z-index:15;
  display:none;flex-direction:column;padding:64px 14px 10px;overflow:hidden;}
.xx-scene.on{display:flex;}
.xx-scene h2{margin:0 0 4px;font-size:16px;color:var(--c-gold);text-shadow:0 1px 4px #000;}
.xx-scene .hint{font-size:11px;color:var(--c-sub);margin-bottom:8px;}

/* 通用按鈕 */
.xx-btn{background:linear-gradient(180deg,var(--c-panel2),var(--c-panel));
  border:1px solid var(--c-line);color:var(--c-text);border-radius:10px;
  padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;
  transition:transform .08s,box-shadow .15s;}
.xx-btn:active{transform:scale(.95);}
.xx-btn.gold{background:linear-gradient(180deg,#f7d77e,#e0a93b);color:#3a2400;border-color:#f0c668;
  box-shadow:0 0 14px rgba(224,169,59,.45);}
.xx-btn.big{padding:13px 18px;font-size:15px;width:100%;}
.xx-btn:disabled{opacity:.4;cursor:not-allowed;}

/* ===== 探索 HUD（搖桿、技能鈕、回洞府） ===== */
#xx-explore-ui{position:absolute;inset:0;z-index:18;display:none;pointer-events:none;}
#xx-root.in-explore #xx-explore-ui{display:block;}
#xx-joy{position:absolute;left:18px;bottom:24px;width:118px;height:118px;border-radius:50%;
  background:radial-gradient(circle,rgba(157,111,224,.14),rgba(0,0,0,.28));
  border:1px solid rgba(157,111,224,.35);pointer-events:auto;}
#xx-joy .stick{position:absolute;left:50%;top:50%;width:52px;height:52px;margin:-26px;
  border-radius:50%;background:radial-gradient(circle at 35% 30%,#b78cf0,#6a47a8);
  box-shadow:0 3px 10px rgba(0,0,0,.5),inset 0 2px 6px rgba(255,255,255,.3);}
#xx-skills{position:absolute;right:14px;bottom:18px;width:182px;height:182px;pointer-events:none;}
.xx-skill{position:absolute;border-radius:50%;pointer-events:auto;border:2px solid rgba(255,255,255,.18);
  display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;
  color:#fff;background:radial-gradient(circle at 35% 30%,#3a2f52,#1a1428);overflow:hidden;
  text-shadow:0 1px 3px #000;cursor:pointer;}
.xx-skill .nm{position:absolute;bottom:3px;font-size:8px;font-weight:700;color:#cbb8ee;}
.xx-skill .cd{position:absolute;inset:0;border-radius:50%;pointer-events:none;
  background:conic-gradient(rgba(0,0,0,.66) var(--cd,0deg), rgba(0,0,0,0) 0);}
.xx-skill .cdt{position:absolute;font-size:14px;font-weight:800;color:#fff;}
.xx-skill.dim{filter:grayscale(.7) brightness(.55);}
#xx-atk{right:10px;bottom:64px;width:92px;height:92px;font-size:30px;
  background:radial-gradient(circle at 35% 30%,#e0a93b,#9c5a12);border-color:#f0c668;}
#xx-s0{right:104px;bottom:64px;width:60px;height:60px;}
#xx-s1{right:36px;bottom:140px;width:60px;height:60px;}
#xx-s2{right:104px;bottom:138px;width:60px;height:60px;}
#xx-s3{right:14px;bottom:8px;width:54px;height:54px;font-size:18px;}

#xx-home-btn{position:absolute;top:60px;right:10px;z-index:22;pointer-events:auto;
  background:rgba(20,15,30,.85);border:1px solid var(--c-line);color:var(--c-gold);
  border-radius:10px;padding:7px 11px;font-size:12px;font-weight:700;cursor:pointer;
  display:none;font-family:inherit;}
#xx-root.in-explore #xx-home-btn{display:block;}

#xx-interact{position:absolute;left:50%;bottom:160px;transform:translateX(-50%);z-index:22;
  pointer-events:auto;display:none;background:linear-gradient(180deg,#f7d77e,#e0a93b);
  color:#3a2400;border:0;border-radius:24px;padding:11px 22px;font-size:14px;font-weight:800;
  box-shadow:0 0 18px rgba(224,169,59,.6);cursor:pointer;animation:xxpulse 1s infinite;
  font-family:inherit;}
@keyframes xxpulse{0%,100%{transform:translateX(-50%) scale(1);}50%{transform:translateX(-50%) scale(1.07);}}

/* ===== 通用彈窗 ===== */
#xx-modal{position:absolute;inset:0;z-index:60;display:none;align-items:center;justify-content:center;
  background:rgba(5,3,10,.72);backdrop-filter:blur(2px);padding:20px;}
#xx-modal.on{display:flex;}
.xx-card{background:linear-gradient(180deg,var(--c-panel2),var(--c-panel));
  border:1px solid var(--c-gold2);border-radius:16px;padding:20px 18px;max-width:340px;width:100%;
  box-shadow:0 0 40px rgba(224,169,59,.3);text-align:center;}
.xx-card h3{margin:0 0 8px;color:var(--c-gold);font-size:17px;}
.xx-card p{margin:0 0 14px;font-size:13px;line-height:1.6;color:var(--c-text);}
.xx-card .btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}

/* ===== 飄字層 ===== */
#xx-float{position:absolute;inset:0;z-index:40;pointer-events:none;overflow:hidden;}
.xx-fl{position:absolute;font-weight:800;text-shadow:0 2px 4px #000;
  animation:xxfloat 1s ease-out forwards;white-space:nowrap;}
@keyframes xxfloat{0%{opacity:0;transform:translate(-50%,0) scale(.6);}
  18%{opacity:1;transform:translate(-50%,-14px) scale(1.1);}
  100%{opacity:0;transform:translate(-50%,-46px) scale(1);}}
.xx-banner{position:absolute;left:50%;top:34%;transform:translateX(-50%);z-index:45;
  font-size:30px;font-weight:900;color:var(--c-gold);text-shadow:0 0 18px var(--c-gold2),0 3px 6px #000;
  animation:xxbanner 1.4s ease-out forwards;pointer-events:none;white-space:nowrap;letter-spacing:2px;}
@keyframes xxbanner{0%{opacity:0;transform:translateX(-50%) scale(.4);}
  20%{opacity:1;transform:translateX(-50%) scale(1.15);}
  75%{opacity:1;transform:translateX(-50%) scale(1);}
  100%{opacity:0;transform:translateX(-50%) scale(1.1);}}
#xx-combo{position:absolute;right:14px;top:40%;z-index:42;text-align:right;display:none;
  pointer-events:none;}
#xx-combo .n{font-size:38px;font-weight:900;color:#ffd86b;
  text-shadow:0 0 16px #e0a93b,0 3px 6px #000;line-height:1;}
#xx-combo .t{font-size:13px;font-weight:800;color:#fff;text-shadow:0 2px 4px #000;}

/* 死亡灰化遮罩 */
#xx-death{position:absolute;inset:0;z-index:50;display:none;pointer-events:none;
  background:radial-gradient(circle,rgba(80,0,0,.0) 30%,rgba(60,0,0,.6) 100%);}
#xx-death.on{display:block;pointer-events:auto;}

/* 場景內格狀/列表 */
.xx-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;overflow-y:auto;flex:1;
  padding-right:2px;}
.xx-slot{background:var(--c-panel);border:1px solid var(--c-line);border-radius:10px;
  aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;cursor:pointer;font-size:24px;}
.xx-slot .qn{position:absolute;right:3px;bottom:2px;font-size:10px;font-weight:800;color:#fff;
  text-shadow:0 1px 2px #000;}
.xx-slot .nm{font-size:8px;color:var(--c-sub);margin-top:2px;text-align:center;line-height:1.1;}
.r1{border-color:#5a5a6a;} .r2{border-color:#4a7fd0;box-shadow:0 0 7px rgba(74,127,208,.4);}
.r3{border-color:#9d6fe0;box-shadow:0 0 9px rgba(157,111,224,.5);}
.r4{border-color:#f5d27a;box-shadow:0 0 12px rgba(245,210,122,.6);}
.r5{border-color:#ff8a3c;box-shadow:0 0 16px rgba(255,138,60,.75);}

.xx-list{overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:8px;}
.xx-row{background:var(--c-panel);border:1px solid var(--c-line);border-radius:10px;
  padding:10px 12px;display:flex;align-items:center;gap:10px;}
.xx-row .ico{font-size:24px;}
.xx-row .info{flex:1;min-width:0;}
.xx-row .info b{font-size:13px;color:var(--c-text);display:block;}
.xx-row .info span{font-size:10px;color:var(--c-sub);display:block;line-height:1.3;}

.xx-tag{display:inline-block;font-size:10px;padding:1px 7px;border-radius:8px;font-weight:700;}
.xx-scroll{overflow-y:auto;flex:1;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:#3a2f52;border-radius:4px;}

.xx-area-card{background:var(--c-panel);border:1px solid var(--c-line);border-radius:12px;
  padding:12px;margin-bottom:9px;cursor:pointer;position:relative;overflow:hidden;}
.xx-area-card.lock{opacity:.5;}
.xx-area-card b{font-size:14px;}
.xx-area-card .d{font-size:10px;color:var(--c-sub);margin:3px 0 6px;}
.xx-area-card .pb{height:6px;background:#2a2238;border-radius:4px;overflow:hidden;}
.xx-area-card .pb>i{display:block;height:100%;background:linear-gradient(90deg,#e0a93b,#f5d27a);}

@media (max-height:620px){.xx-scene{padding-top:58px;}}
</style>

<div id="xx-root">
  <canvas id="xx-canvas"></canvas>
  <canvas id="xx-minimap" width="74" height="74"></canvas>

  <!-- 頂部狀態 -->
  <div id="xx-top">

  <div class="xx-scene" id="sc-meditate" style="background:none;justify-content:flex-end;">

      <div id="xx-med-info" style="font-size:12px;color:var(--c-qi);text-shadow:0 1px 4px #000;"></div>

  <!-- ===== 場景：歷練選單 ===== -->
  <div class="xx-scene" id="sc-explore-menu">

    <div class="xx-scroll" id="xx-area-list"></div>

  <!-- ===== 場景：煉丹 ALCHEMY ===== -->
  <div class="xx-scene" id="sc-alchemy" style="background:none;">

      border-radius:12px;padding:12px;">

      </div>

      <button class="xx-btn" id="xx-auc-next" style="width:100%;margin-top:8px;">下一件 / 進場</button>

  <!-- ===== 場景：背包 INVENTORY ===== -->
  <div class="xx-scene" id="sc-inventory">
    <h2>🎒 乾坤袋</h2>

  <div id="xx-tabs">

function enforceMonotonic(){

const FX={shake:0,hitstop:0,slowmo:0,flash:0,goldBeam:0};
function shake(p){FX.shake=Math.max(FX.shake,p);}
function hitstop(ms){FX.hitstop=Math.max(FX.hitstop,ms);}
function slowmo(ms){FX.slowmo=Math.max(FX.slowmo,ms);}

const particles=[];
function spawnParticle(x,y,vx,vy,life,color,size,grav){
 particles.push({x,y,vx,vy,life,max:life,color,size:size||3,grav:grav||0});}
function updateParticles(dt){
 for(let i=particles.length-1;i>=0;i--){const p=particles[i];
  p.life-=dt;if(p.life<=0){particles.splice(i,1);continue;}
  p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=(p.grav||0)*dt;}}
function drawParticles(){
 particles.forEach(p=>{const a=clamp(p.life/p.max,0,1);
  ctx.globalAlpha=a;ctx.fillStyle=p.color;
  ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,7);ctx.fill();});
 ctx.globalAlpha=1;}

 ctx.fillStyle="rgba(0,0,0,.6)";ctx.fillRect(sx-bw/2,yy,bw,4);
 ctx.fillStyle=m.elite?"#f5d27a":(m.boss?"#ff5a6a":"#7df0da");ctx.fillRect(sx-bw/2,yy,bw*hpr,4);
 if(m.elite||m.boss){ctx.strokeStyle="#f5d27a";ctx.lineWidth=1;ctx.strokeRect(sx-bw/2,yy,bw,4);}
 ctx.textAlign="left";ctx.textBaseline="alphabetic";
}

/* =====================================================================
   7. 區域世界 / 怪物 AI（WANDER/CHASE/ATTACK/RETURN）
   ===================================================================== */
let world=null;
function buildArea(area){
 const Wd=area.bounds.w,Hd=area.bounds.h;
 const w={area,entities:[],drops:[],bossKilled:!!S.areaBoss[area.id]};
 const entry={type:"portal",wx:3,wy:3,target:"home",label:"回洞府"};
 w.entities.push(entry);w.entry=entry;
 player.wx=4;player.wy=4;
 for(let i=0;i<area.spawns.npc;i++)w.entities.push({type:"npc",wx:rand(5,8),wy:rand(2,5)});
 const depth=(wx,wy)=>clamp((wx+wy)/(Wd+Hd),0,1);
 const place=m=>({wx:rand(m,Wd-m),wy:rand(m,Hd-m)});
 for(let i=0;i<area.spawns.mob;i++){const p=place(2),df=depth(p.wx,p.wy);
  const er=Math.round(area.erMin+(area.erMax-area.erMin)*df);
  w.entities.push(makeMob(area,p.wx,p.wy,er,false,false));}
 for(let i=0;i<area.spawns.elite;i++){const p=place(6),df=depth(p.wx,p.wy);
  const er=Math.round(area.erMin+(area.erMax-area.erMin)*Math.max(df,0.5));
  w.entities.push(makeMob(area,p.wx,p.wy,er,true,false));}
 for(let i=0;i<area.spawns.chest;i++){const p=place(3);
  w.entities.push({type:"chest",wx:p.wx,wy:p.wy,opened:false});}
 for(let i=0;i<area.spawns.herb;i++){const p=place(2);w.entities.push({type:"herb",wx:p.wx,wy:p.wy});}
 for(let i=0;i<area.spawns.enc;i++){const p=place(4);w.entities.push({type:"enc",wx:p.wx,wy:p.wy});}
 if(!w.bossKilled)w.entities.push(makeMob(area,Wd-4,Hd-4,area.erMax,false,true));
 const nextArea=AREAS.find(a=>a.id===area.id+1);
 if(nextArea)w.entities.push({type:"portal",wx:Wd-3,wy:Hd-3,target:nextArea.id,
   label:"前往"+nextArea.name,glow:true});
 world=w;
}
function makeMob(area,wx,wy,er,elite,boss){
 const em=boss?25:(elite?6:1);
 const type=boss?null:area.mobTypes[Math.floor(Math.random()*area.mobTypes.length)];
 const def=boss?BOSSES[area.boss]:MOBS[type];
 const hp=enemyHp(er,em);
 return {type:"mob",mobType:type,def,wx,wy,homeX:wx,homeY:wy,er,elite,boss,eliteMult:em,
  hp,maxHp:hp,atk:enemyAtk(er,em),state:"WANDER",knock:0,hurtFlash:0,
  scale:boss?1.5:(elite?1.2:1),seed:Math.random()*6,wanderT:0,wtx:wx,wty:wy,atkCd:0,
  dead:false,respawnT:0,tauntShown:false};
}
function updateMobs(dt){
 const u=TILE_W/2;
 const aggro=180/u,leash=420/u,atkRange=70/u;
 world.entities.forEach(m=>{
  if(m.type!=="mob")return;
  if(m.dead){m.respawnT-=dt;return;}
  m.hurtFlash=Math.max(0,m.hurtFlash-dt*4);
  m.knock*=Math.pow(0.001,dt);if(m.knock<0.01)m.knock=0;
  const dx=player.wx-m.wx,dy=player.wy-m.wy,dist=Math.hypot(dx,dy);
  const homeDist=Math.hypot(player.wx-m.homeX,player.wy-m.homeY);
  if(m.state==="WANDER"){
   if(dist<aggro)m.state="CHASE";
   else{m.wanderT-=dt;if(m.wanderT<=0){m.wanderT=rand(1.5,3.5);
     m.wtx=m.homeX+rand(-2,2);m.wty=m.homeY+rand(-2,2);}
    moveTo(m,m.wtx,m.wty,COMBAT.moveSpeed*0.4*dt/u);}
  }else if(m.state==="CHASE"){
   if(homeDist>leash)m.state="RETURN";
   else if(dist<atkRange){m.state="ATTACK";m.atkCd=0;}
   else moveTo(m,player.wx,player.wy,COMBAT.moveSpeed*0.62*dt/u);
  }else if(m.state==="ATTACK"){
   if(dist>atkRange*1.3)m.state="CHASE";
   else{m.atkCd-=dt;if(m.atkCd<=0){m.atkCd=1.1;mobHitPlayer(m);}}
  }else if(m.state==="RETURN"){
   moveTo(m,m.homeX,m.homeY,COMBAT.moveSpeed*0.5*dt/u);
   if(Math.hypot(m.wx-m.homeX,m.wy-m.homeY)<0.4)m.state="WANDER";
  }
 });
 world.entities.forEach(m=>{
  if(m.type==="mob"&&m.dead&&!m.boss&&m.respawnT<=0){
   const far=Math.hypot(player.wx-m.homeX,player.wy-m.homeY)>9;
   if(far){m.dead=false;m.hp=m.maxHp;m.state="WANDER";m.wx=m.homeX;m.wy=m.homeY;}
   else m.respawnT=2;}
 });
}
function moveTo(m,tx,ty,sp){const dx=tx-m.wx,dy=ty-m.wy,d=Math.hypot(dx,dy);
 if(d>0.05){m.wx+=dx/d*sp;m.wy+=dy/d*sp;}}
function mobHitPlayer(m){
 if(player.invuln>0||!sessionActive)return;
 const dmg=Math.max(1,m.atk-playerDef());
 player.hp-=dmg;player.hurtFlash=1;shake(3);
 const sp=iso(player.wx,player.wy);
 floatText("-"+fmt(dmg),sp.x,sp.y-44,"#ff6b6b",16);
 if(player.hp<=0){player.hp=0;onDeath();}
}

/* =====================================================================
   8. 玩家攻擊 / 技能 / 撿物
   ===================================================================== */
function dealDamage(m,dmg,crit){
 if(m.dead)return;
 m.hp-=dmg;m.hurtFlash=1;m.knock=0.35;hitstop(crit?50:32);
 const sp=iso(m.wx,m.wy);
 for(let i=0;i<4;i++)spawnParticle(sp.x,sp.y-14,rand(-40,40),rand(-60,-10),0.25,"#fff",2);
 floatText((crit?"暴!":"")+"-"+fmt(dmg),sp.x+rand(-8,8),sp.y-30,crit?"#ffd86b":"#fff",crit?20:14);
 if(crit)shake(5);
 if(m.hp<=0)killMob(m);else registerCombo();
}
function killMob(m){
 m.dead=true;m.respawnT=90;m.state="WANDER";
 registerCombo();registerKillStreak();
 const exp=expPerKill(m.er)*(m.boss?20:(m.elite?5:1));
 S.exp+=exp;addQi(expToQi(exp,S.realm));
 // 戰鬥熟練度（ATK 加成）只增不減；達上限後把 exp 鎖在 0，避免存檔無限膨脹
 if(S.combatBonus<0.5){const need=breakCost()*0.5;
  while(S.exp>=need&&S.combatBonus<0.5){S.exp-=need;S.combatBonus=Math.min(0.5,S.combatBonus+0.02);
   floatText("熟練度↑ ATK+2%",W/2,H*0.4,"#7df0da",13);}}
 else S.exp=0;
 let stones=stoneGain(m.er,m.eliteMult);
 const cl=S.daily.clears||{};
 if((cl[world.area.id]||0)<3&&(m.boss||m.elite))stones*=2;
 spawnDrop(m.wx,m.wy,"stone",stones);
 if(Math.random()<0.5)spawnDrop(m.wx,m.wy,"herb",1);
 const rRoll=Math.random();
 if(rRoll<(m.boss?0.6:m.elite?0.12:0.03))spawnDrop(m.wx,m.wy,"treasure",rollRareDropTier(m));
 if(m.mobType){if(!S.areaClear[world.area.id])S.areaClear[world.area.id]={kinds:{},chests:0};
  S.areaClear[world.area.id].kinds[m.mobType]=true;}
 if(m.boss){world.bossKilled=true;S.areaBoss[world.area.id]=true;
  unlockMilestone("boss_"+world.area.id,"⚔️ 斬殺 "+m.def.name);
  banner("Boss 斬殺！","#ff5a6a");hitstop(120);shake(10);}
 questProgress("kill",1);if(m.boss)questProgress("boss",1);
 updateAreaClearAndUnlock();saveGame();
}
function rollRareDropTier(m){
 for(let i=RARITY.length-1;i>=0;i--){if(Math.random()<RARITY[i].chance*(m.boss?4:1))return RARITY[i].t;}
 return 1;}
const combo={n:0,timer:0};
function registerCombo(){combo.n++;combo.timer=5;
 const el=$("xx-combo");el.style.display="block";
 el.querySelector(".n").textContent="×"+combo.n;
 el.querySelector(".n").style.fontSize=clamp(30+combo.n*1.4,30,64)+"px";}
const streak={n:0,timer:0,atkBuff:0};
function registerKillStreak(){streak.n++;streak.timer=8;
 if(streak.n===5)banner("連殺！","#f5d27a");
 if(streak.n===10){banner("無雙！","#ffd86b");streak.atkBuff=4;}
 if(streak.n===20){banner("屠戮！","#ff5a6a");streak.atkBuff=6;}}

function doAttack(){
 if(player.atkTimer>0||!sessionActive)return;
 player.atkTimer=COMBAT.atkCdMs/1000;player.attacking=0.2;
 player.facing=(player.dir.x-player.dir.y)>=0?1:-1;
 const range=COMBAT.atkRange/(TILE_W/2);
 const dmg=Math.round(playerAtk()*(1+(streak.atkBuff?0.2:0)));
 nearbyMobs(range).forEach(m=>{const crit=Math.random()<0.18;
  dealDamage(m,Math.round(dmg*(crit?1.8:1)),crit);});
}
function nearbyMobs(range){const arr=[];
 world.entities.forEach(m=>{if(m.type==="mob"&&!m.dead&&
  Math.hypot(m.wx-player.wx,m.wy-player.wy)<=range)arr.push(m);});return arr;}
const skillCd=[0,0,0,0];
// 劍陣（御劍轟擊）：由 dt 驅動、每 0.33 秒造成一次傷害、最多 2 秒；提前宣告以免在 useSkill 中參照到尚未初始化的變數
const swordArrays=[];
function useSkill(idx){
 if(!sessionActive)return;
 const sk=SKILLS[idx];if(skillCd[idx]>0)return;
 if(S.qi<sk.qi){flashSkillDim(idx);return;}
 S.qi=Math.max(0,S.qi-sk.qi);skillCd[idx]=sk.cd/1000;
 const dmg=playerAtk()*sk.mult,sp=iso(player.wx,player.wy),dir=player.dir;
 if(sk.kind==="line"){
  effects.push({kind:"slash",x:sp.x,y:sp.y-14,ang:Math.atan2(dir.y,dir.x)*0+Math.atan2((dir.x+dir.y)*TILE_H,(dir.x-dir.y)*TILE_W),life:0.4,max:0.4});
  world.entities.forEach(m=>{if(m.type==="mob"&&!m.dead){
   const rx=m.wx-player.wx,ry=m.wy-player.wy,d=Math.hypot(rx,ry);
   if(d<8&&(rx*dir.x+ry*dir.y)/(d||1)>0.4)dealDamage(m,Math.round(dmg),false);}});
 }else if(sk.kind==="aoe"){
  const tx=player.wx+dir.x*3,ty=player.wy+dir.y*3,tp=iso(tx,ty);
  effects.push({kind:"thunder",x:tp.x,y:tp.y,life:0.45,max:0.45});shake(7);
  world.entities.forEach(m=>{if(m.type==="mob"&&!m.dead&&Math.hypot(m.wx-tx,m.wy-ty)<2.2){
   dealDamage(m,Math.round(dmg),true);m.state="WANDER";m.atkCd=0.5;}});
  for(let i=0;i<14;i++)spawnParticle(tp.x,tp.y,rand(-80,80),rand(-30,-120),0.4,"#bfe6ff",3);
 }else if(sk.kind==="ring"){
  // 修：原本用 setInterval 會在切場景/重進歷練後殘留並對舊世界開刀（計時器疊加）。
  // 改成由主迴圈 dt 驅動的「劍陣」物件，綁定當前 world，life 到 0 自動消失，絕不疊加。
  swordArrays.push({life:2,max:2,tick:0,world,dmg:Math.round(playerAtk())});
  effects.push({kind:"sword_array",x:sp.x,y:sp.y-14,life:2,max:2});
  shake(4);
 }else if(sk.kind==="dash"){
  player.wx+=dir.x*4;player.wy+=dir.y*4;clampPlayer();player.invuln=0.4;
  for(let i=0;i<8;i++)spawnParticle(sp.x,sp.y-14,rand(-60,60),rand(-40,40),0.3,"#b78cf0",3);
  world.entities.forEach(m=>{if(m.type==="mob"&&!m.dead&&
   Math.hypot(m.wx-player.wx,m.wy-player.wy)<2)dealDamage(m,Math.round(playerAtk()),false);});
 }
}
function flashSkillDim(idx){const el=$("xx-s"+idx);el.style.borderColor="#ff5a6a";
 setTimeout(()=>el.style.borderColor="",250);}

function spawnDrop(wx,wy,kind,val){world.drops.push({wx,wy,kind,val,t:0,flying:false,
 emoji:kind==="stone"?"💎":kind==="herb"?"🌿":"✨"});}
function updateDrops(dt){
 const pick=55/(TILE_W/2);
 for(let i=world.drops.length-1;i>=0;i--){const d=world.drops[i];d.t+=dt;
  const dist=Math.hypot(d.wx-player.wx,d.wy-player.wy);
  if(dist<pick||d.flying){d.flying=true;
   const dx=player.wx-d.wx,dy=player.wy-d.wy,dd=Math.hypot(dx,dy),sp=600/(TILE_W/2)*dt;
   if(dd<0.3){collectDrop(d);world.drops.splice(i,1);}else{d.wx+=dx/dd*sp;d.wy+=dy/dd*sp;}}}
}
function collectDrop(d){const sp=iso(player.wx,player.wy);
 if(d.kind==="stone"){S.stones+=d.val;floatText("+"+fmt(d.val)+" 靈石",sp.x,sp.y-40,"#6ee787",14);}
 else if(d.kind==="herb"){addItem("herb","herb"+herbGrade(),1);
  floatText("+靈草",sp.x,sp.y-40,"#6ee787",13);}
 else if(d.kind==="treasure"){addItem("treasure","drop"+d.val,1,{name:RARITY_NAMES[d.val-1]+"掉落",emoji:"✨"});rareDropShow(d.val);}
}
function herbGrade(){return clamp(world.area.erMin+1,1,6);}
function rareDropShow(tier){const sp=iso(player.wx,player.wy);
 if(tier>=4){FX.goldBeam=0.6;slowmo(300);shake(8);
  banner(tier===5?"仙品！":"極品！",RARITY_COLOR[tier-1]);
  for(let i=0;i<30;i++)spawnParticle(sp.x,sp.y-20,rand(-100,100),rand(-180,-40),0.8,RARITY_COLOR[tier-1],3,200);}
 else{floatText(RARITY_NAMES[tier-1]+"掉落!",sp.x,sp.y-40,RARITY_COLOR[tier-1],15);shake(3);}
 unlockMilestone("rare"+tier,"✨ 獲得"+RARITY_NAMES[tier-1]+"掉落");}

/* =====================================================================
   9. 視覺特效層
   ===================================================================== */
const effects=[];
function updateSwordArrays(dt){
 for(let i=swordArrays.length-1;i>=0;i--){const sa=swordArrays[i];
  // 綁定的世界已被換掉（重進歷練/切場景）或已退出歷練 → 直接作廢，不對新世界開刀
  if(!sessionActive||sa.world!==world){swordArrays.splice(i,1);continue;}
  sa.life-=dt;sa.tick-=dt;
  if(sa.tick<=0){sa.tick=0.33;
   world.entities.forEach(m=>{if(m.type==="mob"&&!m.dead&&
    Math.hypot(m.wx-player.wx,m.wy-player.wy)<3.2)dealDamage(m,sa.dmg,false);});}
  if(sa.life<=0)swordArrays.splice(i,1);}
}
function updateEffects(dt){for(let i=effects.length-1;i>=0;i--){effects[i].life-=dt;
 if(effects[i].life<=0)effects.splice(i,1);}}
function drawEffects(){
 effects.forEach(e=>{const a=e.life/e.max;
  if(e.kind==="slash"){ctx.save();ctx.translate(e.x,e.y);ctx.rotate(e.ang);
   ctx.globalAlpha=a;ctx.strokeStyle="#cfe6ff";ctx.lineWidth=5;
   ctx.beginPath();ctx.arc(40,0,40,-0.6,0.6);ctx.stroke();
   ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.stroke();ctx.restore();}
  else if(e.kind==="thunder"){ctx.save();ctx.globalAlpha=a;ctx.strokeStyle="#dff";ctx.lineWidth=4;
   ctx.beginPath();ctx.moveTo(e.x,e.y-200);let yy=e.y-200;
   while(yy<e.y){ctx.lineTo(e.x+rand(-12,12),yy);yy+=18;}ctx.lineTo(e.x,e.y);ctx.stroke();
   ctx.fillStyle="rgba(180,230,255,"+(a*0.5)+")";
   ctx.beginPath();ctx.ellipse(e.x,e.y,60*(1-a)+20,20*(1-a)+8,0,0,7);ctx.fill();ctx.restore();}
  else if(e.kind==="sword_array"){ctx.save();ctx.globalAlpha=a*0.9;ctx.translate(e.x,e.y);
   const R=70;ctx.strokeStyle="#b78cf0";ctx.lineWidth=2;
   for(let k=0;k<6;k++){const ang=performance.now()/300+k*Math.PI/3;
    const x=Math.cos(ang)*R,y=Math.sin(ang)*R*0.5;
    ctx.save();ctx.translate(x,y);ctx.rotate(ang);ctx.fillStyle="#cfe6ff";
    ctx.beginPath();ctx.moveTo(0,-10);ctx.lineTo(2,4);ctx.lineTo(-2,4);ctx.closePath();ctx.fill();ctx.restore();}
   ctx.beginPath();ctx.arc(0,0,R,0,7);ctx.stroke();ctx.restore();}
 });
}

/* =====================================================================
   11. 歷練 SESSION 狀態機（切頁=暫停不結束、單調不倒退）
   ===================================================================== */
let sessionActive=false;
function enterExplore(areaId){
 const area=AREAS.find(a=>a.id===areaId);if(!area)return;
 if(!areaUnlocked(area)){modal("尚未解鎖","需求："+areaReq(area),[{t:"知道了",f:closeModal}]);return;}
 buildArea(area);
 player.maxHp=playerMaxHp();player.hp=playerMaxHp();player.invuln=0;player.hurtFlash=0;
 sessionActive=true;MODE="explore";SUB="explore";
 root.classList.add("in-explore");showScene(null);
 $("xx-area").textContent=area.name;$("xx-death").classList.remove("on");
 saveGame();
}
$("xx-home-btn").addEventListener("click",()=>{
 modal("收功回洞府？","當前戰鬥進度、清理度、靈石全部保留。",[
  {t:"取消",f:closeModal},
  {t:"確定回洞府",gold:true,f:()=>{closeModal();exitExplore(true);}}]);
});
function exitExplore(toHome){
 sessionActive=false;MODE="home";root.classList.remove("in-explore");
 swordArrays.length=0; // 退出歷練：清掉殘留劍陣，避免對下次世界生效
 $("xx-area").textContent="洞府";saveGame();if(toHome)gotoScene("home");
}
function onDeath(){
 if(!sessionActive)return;sessionActive=false;
 $("xx-death").classList.add("on");shake(8);
 const now=Date.now();let pct=(now-(S._lastDeath||0)<60000)?0.05:0.1;
 S._lastDeath=now;
 const lost=Math.min(500,Math.floor(S.stones*pct));S.stones-=lost;
 const hasRevive=(S.inv.pill["drop5"]||0)>0||hasRevivePill();
 modal("⚰️ 你倒下了…",
  "境界與修為毫髮無傷（永不倒退），僅損失 "+fmt(lost)+" 隨身靈石。如何復活？",
  [{t:hasRevive?"💊 原地復活(耗還魂丹)":"💊 無還魂丹",gold:hasRevive,disabled:!hasRevive,
    f:()=>{closeModal();reviveInPlace();}},
   {t:"🏮 回村復活(免費)",f:()=>{closeModal();reviveAtCheckpoint();}}]);
 saveGame();
}
function hasRevivePill(){ // 找仙品/還魂丹
 for(const k in S.inv.pill){if(S.inv.pill[k]>0){const m=S._meta[k];
  if(m&&(m.grade===5||m.tier===5))return true;}}return false;}
function consumeRevivePill(){
 if(S.inv.pill["drop5"]>0){S.inv.pill["drop5"]--;return;}
 for(const k in S.inv.pill){if(S.inv.pill[k]>0){const m=S._meta[k];
  if(m&&(m.grade===5||m.tier===5)){S.inv.pill[k]--;return;}}}}
function reviveInPlace(){consumeRevivePill();
 player.hp=playerMaxHp();player.invuln=3;
 world.entities.forEach(m=>{if(m.type==="mob"&&!m.dead&&
  Math.hypot(m.wx-player.wx,m.wy-player.wy)<4){m.knock=1;m.state="RETURN";}});
 $("xx-death").classList.remove("on");sessionActive=true;MODE="explore";
 banner("浴火重生！","#7df0da");}
function reviveAtCheckpoint(){player.wx=world.entry.wx;player.wy=world.entry.wy;
 player.hp=playerMaxHp();player.invuln=2;
 $("xx-death").classList.remove("on");sessionActive=true;MODE="explore";}

function addQi(n){S.qi+=n;S.lifetimeQi+=n;const cap=breakCost();

 S.qi-=breakCost();breakAnim=1.2;
 if(Math.random()<rate){S.realm++;S.breakBonus=Math.max(0,S.breakBonus-0.1);
  banner("突破成功！"+REALM_NAMES[S.realm],"#f5d27a");shake(10);FX.goldBeam=0.5;
  modal("⚡ 突破成功！晉升 "+REALM_NAMES[S.realm],REALM_DESC[S.realm],
   [{t:"再接再厲",gold:true,f:closeModal}]);
  questProgress("break",1);unlockMilestone("realm"+S.realm,"🌟 晉升 "+REALM_NAMES[S.realm]);
 }else{S.qi=Math.floor(S.qi*0.6);banner("突破失敗…","#ff6b6b");shake(6);
  modal("突破失敗","靈氣炸散，損失四成已存靈氣。境界不動，調息再來——穩住心神。",
   [{t:"穩住，再來",f:closeModal}]);}

function auctionBid(buyNow){if(!auc)return;
 const inc=Math.max(Math.round(auc.cur*0.05),10);

 if(auc.holder==="none"&&!buyNow)myBid=auc.cur;

function todayKey(){const d=new Date(Date.now()+8*3600*1000);

 {id:"kill",name:"斬妖 30 隻",goal:30,reward:{stones:300,herb:2}},
 {id:"refine",name:"煉丹 2 爐",goal:2,reward:{stones:200}},

/* =====================================================================
   19. 區域解鎖 / 清理度
   ===================================================================== */
function areaClearPct(area){const c=S.areaClear[area.id]||{kinds:{},chests:0};
 const kinds=Object.keys(c.kinds||{}).length;
 const kindPart=kinds/area.mobTypes.length;
 const chestPart=(c.chests||0)/area.spawns.chest;
 const bossPart=S.areaBoss[area.id]?1:0;
 return clamp(kindPart*0.4+chestPart*0.3+bossPart*0.3,0,1);}
function areaUnlocked(area){const u=area.unlock;
 if(S.realm<u.realm)return false;
 if(u.prev>0){const prev=AREAS.find(a=>a.id===area.id-1);
  if(prev&&areaClearPct(prev)<u.prev)return false;}
 if(u.bossKilled){const ba=AREAS.find(a=>a.boss===u.bossKilled);if(ba&&!S.areaBoss[ba.id])return false;}
 return true;}
function areaReq(area){const u=area.unlock,s=[];
 if(u.realm>0)s.push("境界 ≥ "+REALM_NAMES[u.realm]);
 if(u.prev>0)s.push("前一區清理度 ≥ "+(u.prev*100)+"%");
 if(u.bossKilled)s.push("已斬 焚天魔尊");
 return s.join("，")||"無";}
function updateAreaClearAndUnlock(){const pct=areaClearPct(world.area);
 if(pct>=1&&!(S.areaClear[world.area.id]&&S.areaClear[world.area.id].rewarded)){
  if(!S.areaClear[world.area.id])S.areaClear[world.area.id]={kinds:{},chests:0};

const joy={active:false,baseX:0,baseY:0,dx:0,dy:0};
const joyEl=$("xx-joy"),stickEl=$("xx-joy-stick");
function joyStart(e){const r=joyEl.getBoundingClientRect();joy.active=true;
 joy.baseX=r.left+r.width/2;joy.baseY=r.top+r.height/2;joyMove(e);}
function joyMove(e){if(!joy.active)return;
 let dx=e.clientX-joy.baseX,dy=e.clientY-joy.baseY;
 const len=Math.hypot(dx,dy),max=50;if(len>max){dx=dx/len*max;dy=dy/len*max;}
 joy.dx=len<12?0:dx/max;joy.dy=len<12?0:dy/max;
 stickEl.style.transform="translate("+dx+"px,"+dy+"px)";}
function joyEnd(){joy.active=false;joy.dx=0;joy.dy=0;stickEl.style.transform="";}
joyEl.addEventListener("pointerdown",e=>{e.preventDefault();try{joyEl.setPointerCapture(e.pointerId);}catch(x){}joyStart(e);});
joyEl.addEventListener("pointermove",e=>{if(joy.active)joyMove(e);});
joyEl.addEventListener("pointerup",joyEnd);joyEl.addEventListener("pointercancel",joyEnd);

 const g=ctx.createLinearGradient(0,0,0,H);
 g.addColorStop(0,"#1c1228");g.addColorStop(1,"#0c0814");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
 ctx.fillStyle="#5a1e28";ctx.beginPath();ctx.moveTo(W*0.4,H*0.4);ctx.lineTo(W*0.6,H*0.4);
 ctx.lineTo(W*0.85,H*0.78);ctx.lineTo(W*0.15,H*0.78);ctx.closePath();ctx.fill();
 ctx.fillStyle="#2a2038";ctx.fillRect(W*0.12,H*0.25,18,H*0.3);ctx.fillRect(W*0.85,H*0.25,18,H*0.3);
 const ax=W/2,ay=H*0.34;ctx.font="38px serif";ctx.textAlign="center";ctx.fillText("🤵",ax,ay);
 ctx.save();ctx.translate(ax+22,ay-18);ctx.rotate(Math.sin(performance.now()/250)*0.4);
 ctx.font="20px serif";ctx.fillText("🔨",0,0);ctx.restore();
 for(let i=0;i<4;i++){const bx=W*0.2+i*W*0.18;
  ctx.fillStyle="#1a1024";ctx.beginPath();ctx.ellipse(bx,H*0.66,14,18,0,0,7);ctx.fill();
  ctx.font="20px serif";ctx.fillStyle="#fff";ctx.fillText("🧝",bx,H*0.66);}
 if(auc&&auc.item){ctx.font="40px serif";ctx.fillText(auc.item.tr.emoji,ax,H*0.5);
  ctx.save();ctx.globalAlpha=0.4+0.3*Math.sin(performance.now()/300);
  const tg=ctx.createRadialGradient(ax,H*0.5,3,ax,H*0.5,40);
  tg.addColorStop(0,RARITY_COLOR[auc.rarityIdx+1]);tg.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=tg;ctx.beginPath();ctx.arc(ax,H*0.5,40,0,7);ctx.fill();ctx.restore();}
 ctx.textAlign="left";drawParticles();
}

/* =====================================================================
   24. 主迴圈（單一 RAF；背景暫停；計時器不疊加）
   ===================================================================== */
let lastFrame=performance.now(),saveTick=0,idleAcc=0;
function loop(now){
 requestAnimationFrame(loop);
 let dt=(now-lastFrame)/1000;lastFrame=now;if(dt>0.1)dt=0.1;
 if(paused)return; // 背景暫停：不結算戰鬥、不掉數值
 if(FX.hitstop>0){FX.hitstop-=dt*1000;if(FX.hitstop>0){renderCurrent();return;}}
 let speed=1;if(FX.slowmo>0){FX.slowmo-=dt*1000;speed=0.35;}
 const sdt=dt*speed;
 // 計時器（與場景無關）
 tickIdle(dt);tickAlchemy();
 for(let i=0;i<4;i++)if(skillCd[i]>0)skillCd[i]=Math.max(0,skillCd[i]-dt);
 if(player.atkTimer>0)player.atkTimer=Math.max(0,player.atkTimer-dt);
 if(player.attacking>0)player.attacking=Math.max(0,player.attacking-dt);
 if(player.invuln>0)player.invuln=Math.max(0,player.invuln-sdt);
 if(player.hurtFlash>0)player.hurtFlash=Math.max(0,player.hurtFlash-dt*4);
 if(breakAnim>0)breakAnim=Math.max(0,breakAnim-dt);
 if(FX.shake>0)FX.shake=Math.max(0,FX.shake-dt*30);
 if(FX.goldBeam>0)FX.goldBeam=Math.max(0,FX.goldBeam-dt*1.2);
 if(FX.flash>0)FX.flash=Math.max(0,FX.flash-dt*1.5);
 if(combo.timer>0){combo.timer-=dt;if(combo.timer<=0){combo.n=0;$("xx-combo").style.display="none";}}
 if(streak.timer>0){streak.timer-=dt;if(streak.timer<=0){streak.n=0;streak.atkBuff=0;}}
 updateParticles(sdt);updateEffects(sdt);
 if(MODE==="explore"&&sessionActive){
  let mvx=joy.dx,mvy=joy.dy;const kb=keyboardMove();if(kb.dx||kb.dy){mvx=kb.dx;mvy=kb.dy;}
  if(mvx||mvy){const wdir=screenDirToWorld(mvx,mvy),wl=Math.hypot(wdir.x,wdir.y)||1;
   const sp=COMBAT.moveSpeed*sdt/(TILE_W/2);
   player.wx+=wdir.x/wl*sp;player.wy+=wdir.y/wl*sp;player.dir={x:wdir.x/wl,y:wdir.y/wl};
   player.facing=(wdir.x-wdir.y)>=0?1:-1;clampPlayer();}
  if(atkHold)doAttack();updateMobs(sdt);updateDrops(sdt);updateSwordArrays(sdt);}
 if(trans>0){trans-=dt*2;if(trans<=0.5&&transCb){transCb();transCb=null;}}
 renderCurrent();updateHUD();
 saveTick+=dt;if(saveTick>3){saveTick=0;saveGame();}
}
function tickIdle(dt){idleAcc+=dt; // 打坐：每秒加靈氣（在線全速，任何場景都算）
 if(idleAcc>=1){const sec=Math.floor(idleAcc);idleAcc-=sec;addQi(curRealm().idle*sec);}}
function renderCurrent(){
 ctx.clearRect(0,0,W,H);ctx.save();
 if(FX.shake>0)ctx.translate(rand(-FX.shake,FX.shake),rand(-FX.shake,FX.shake));
 if(MODE==="explore"){renderExplore();}
 else if(SUB==="meditate"){renderMeditateScene();}
 else if(SUB==="alchemy"){renderAlchemyScene();}
 else if(SUB==="auction"){renderAuctionScene();}
 else{const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#171221");g.addColorStop(1,"#0a0814");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
 ctx.restore();
 if(FX.flash>0){ctx.save();ctx.globalAlpha=FX.flash;ctx.fillStyle="#fff";ctx.fillRect(0,0,W,H);ctx.restore();}
 updateSkillUI();
}
function updateSkillUI(){for(let i=0;i<4;i++){const sk=SKILLS[i],el=$("xx-s"+i);
 const cdEl=el.querySelector(".cd"),cdt=el.querySelector(".cdt");
 if(skillCd[i]>0){const ratio=skillCd[i]/(sk.cd/1000);
  cdEl.style.setProperty("--cd",(ratio*360)+"deg");cdt.textContent=Math.ceil(skillCd[i]);}
 else{cdEl.style.setProperty("--cd","0deg");cdt.textContent="";}
 el.classList.toggle("dim",S.qi<sk.qi);}}

/* =====================================================================
   25. 啟動
   ===================================================================== */
function init(){
 enforceMonotonic(); // 開機先建立／套用進度水位，杜絕載入到倒退存檔
 resize();refreshDaily();
 const off=(Date.now()-(S.lastSave||Date.now()))/1000;if(off>5)applyOffline(off);
 player.maxHp=playerMaxHp();player.hp=playerMaxHp();
 gotoScene("home");updateHUD();requestAnimationFrame(loop);
 if(!S.pickedMeditate&&S.realm===0&&S.qi===0){
  setTimeout(()=>modal("散修崛起 · 開局",
   "你本是凡塵散修，一卷殘訣、一塊靈石起步。<br><br>"+
   "🧘 先去<b>打坐</b>攢靈氣（約 20 秒可第一次突破）<br>"+
   "⚔️ 再去<b>歷練</b>探索打怪，掉靈石靈草<br>"+
   "⚗️ 用靈草<b>煉丹</b>賭稀有度、🏛️ <b>拍賣</b>撿漏<br><br>"+
   "進歷練後切頁=暫停，數值絕不倒退，放膽闖。",
   [{t:"開始修行！",gold:true,f:closeModal}]),400);}
}
init();
})();
</script>
